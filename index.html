<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Çivili Futbol - Optimize Edilmiş</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        body { background: #111; font-family: 'Courier New', Courier, monospace; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100dvh; width: 100vw; color: white; padding: 8px; }
        #menu { position: absolute; background: rgba(20, 30, 20, 0.98); border: 4px solid #4a754a; border-radius: 12px; padding: 25px; text-align: center; z-index: 100; width: 90%; max-width: 360px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        h1 { color: #2ecc71; margin-bottom: 15px; font-size: 24px; text-shadow: 2px 2px black; }
        .input-group { margin-bottom: 14px; text-align: left; }
        label { font-size: 11px; color: #2ecc71; font-weight: bold; display: block; margin-bottom: 4px; }
        input, select { width: 100%; padding: 10px; border-radius: 4px; border: 2px solid #4a754a; background: #1a1a1a; color: white; font-size: 14px; }
        .main-btn { display: block; width: 100%; padding: 12px; background: #2e7d32; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-bottom: 8px; }
        #top-bar { width: 100%; max-width: 360px; display: none; flex-direction: column; gap: 5px; margin-bottom: 6px; }
        .hud-row { display: flex; width: 100%; justify-content: space-between; align-items: center; }
        canvas { background: #2e7d32; border: 6px solid #1b5e20; border-radius: 8px; width: 100%; max-width: 360px; aspect-ratio: 360/620; display: block; }
        #start-match-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80px; height: 80px; border-radius: 50%; background: #27ae60; color: white; border: none; cursor: pointer; display: none; z-index: 50; }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <div id="menu">
        <h1>ÇİVİLİ FUTBOL</h1>
        <div class="input-group"><label>İSİM</label><input type="text" id="player-name" value="Oyuncu"></div>
        <button class="main-btn" onclick="startLocalGame('ai')">🤖 Bilgisayara Karşı</button>
        <button class="main-btn" onclick="startLocalGame('local')">👥 2 Oyuncu</button>
        <button class="main-btn" style="background:#8e44ad" onclick="openOnlineLobby()">🌐 Çevrimiçi</button>
    </div>

    <div id="top-bar">
        <div class="hud-row">
            <button onclick="location.reload()">ÇIKIŞ</button>
            <div id="score-board">0 - 0</div>
            <div id="time-board">90s</div>
        </div>
    </div>

    <div style="position:relative;">
        <canvas id="gameCanvas"></canvas>
        <button id="start-match-btn" onclick="confirmFormations()">BAŞLAT</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 360; canvas.height = 620;
        
        let socket = typeof io !== 'undefined' ? io() : null;
        let gameMode = 'local', currentPhase = 'menu', turn = 1, myTeam = 1;
        let cap = { x: 180, y: 310, vx: 0, vy: 0, radius: 11 };

        // --- TİTREME ÖNLEYİCİ MANTIK ---
        function broadcastState(isVurus = false) {
            if (gameMode !== 'online' || !socket) return;
            // Sadece vuruş yapıldığında veya top durduğunda pozisyon gönder
            socket.emit('updateState', {
                cap: { x: myTeam === 2 ? 360 - cap.x : cap.x, y: myTeam === 2 ? 620 - cap.y : cap.y, vx: isVurus ? (myTeam === 2 ? -cap.vx : cap.vx) : 0, vy: isVurus ? (myTeam === 2 ? -cap.vy : cap.vy) : 0 },
                isVurus: isVurus
            });
        }

        socket?.on('peerState', (data) => {
            // Rakip verisini yumuşak bir şekilde uygula
            if (!data.isVurus) {
                cap.x = myTeam === 2 ? 360 - data.cap.x : data.cap.x;
                cap.y = myTeam === 2 ? 620 - data.cap.y : data.cap.y;
            } else {
                cap.vx = myTeam === 2 ? -data.cap.vx : data.cap.vx;
                cap.vy = myTeam === 2 ? -data.cap.vy : data.cap.vy;
            }
        });

        // Oyun döngüsü
        function update() {
            if (currentPhase === 'playing') {
                cap.x += cap.vx; cap.y += cap.vy;
                cap.vx *= 0.98; cap.vy *= 0.98;
                
                // Çarpışma ve diğer fizik kuralları buraya...
            }
            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0, 0, 360, 620);
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(cap.x, cap.y, cap.radius, 0, Math.PI * 2);
            ctx.fill();
        }

        function startLocalGame(mode) {
            gameMode = mode;
            currentPhase = 'playing';
            document.getElementById('menu').style.display = 'none';
            document.getElementById('top-bar').style.display = 'flex';
            update();
        }

        // Mouse/Dokunma vuruş anı
        window.addEventListener('mouseup', () => {
            if (currentPhase !== 'playing') return;
            // Vuruş hesaplandıktan sonra:
            broadcastState(true); 
        });
    </script>
</body>
</html>
