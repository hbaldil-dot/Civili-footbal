<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
    <title>Çivili Futbol - Online</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js" defer></script>
    <script src="game.js" defer></script>
</head>
<body>

    <!-- ===== ANA MENÜ ===== -->
    <div id="menu">
        <h1>⚽ ÇİVİLİ FUTBOL</h1>
        
        <div class="input-group">
            <label>👤 OYUNCU İSMİ</label>
            <input type="text" id="player-name" value="Oyuncu" maxlength="12">
        </div>

        <div class="mode-container">
            <button class="main-btn btn-ai" onclick="startLocalGame('ai')">🤖 Bilgisayara Karşı</button>
            <button class="main-btn btn-local" onclick="startLocalGame('local')">👥 2 Kişilik Aynı Ekran</button>
            <button class="main-btn btn-online" onclick="openOnlineLobby()">🌐 Online Maç</button>
        </div>
    </div>

    <!-- ===== ONLINE LOBI ===== -->
    <div id="online-lobby" style="display: none;">
        <div class="popup-content">
            <h2>🌐 ÇEVRİMİÇİ HAVUZ</h2>
            <div class="player-list" id="lobby-list">
                <div style="padding:15px;color:#888;text-align:center;">Yükleniyor...</div>
            </div>
            <button class="lobby-close-btn" onclick="closeOnlineLobby()">🔙 Geri Dön</button>
        </div>
    </div>

    <!-- ===== OYUN EKRANI ===== -->
    <div id="top-bar" style="display: none;">
        <div class="hud-row">
            <button id="exit-btn" onclick="exitToMenu()">❌ ÇIKIŞ</button>
            <div id="turn-indicator">⚡ SIRA</div>
            <div id="score-board">
                <span id="score-p1">0</span>
                <span id="score-divider">-</span>
                <span id="score-p2">0</span>
            </div>
            <div id="time-board">90s</div>
        </div>
    </div>

    <div class="canvas-container">
        <canvas id="gameCanvas"></canvas>
        <button id="start-btn" onclick="startMatch()">BAŞLAT</button>
        <div id="setup-timer">15</div>
    </div>

</body>
</html>
