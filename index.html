<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Çivili Futbol - Taktik v13</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        body {
            background: #111; font-family: 'Courier New', Courier, monospace; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white;
        }
        #menu {
            position: absolute; background: rgba(20, 30, 20, 0.98); border: 4px solid #4a754a;
            border-radius: 12px; padding: 25px; text-align: center; z-index: 10; width: 90%; max-width: 350px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        h1 { color: #2ecc71; margin-bottom: 20px; font-size: 26px; text-shadow: 2px 2px black; font-weight: bold; }
        .input-group { margin-bottom: 14px; text-align: left; }
        .input-group label { font-size: 11px; color: #2ecc71; font-weight: bold; display: block; margin-bottom: 4px; letter-spacing: 1px; }
        input, select {
            width: 100%; padding: 10px; border-radius: 4px; border: 2px solid #4a754a; background: #1a1a1a; color: white; font-size: 14px; font-family: inherit;
        }
        .main-btn {
            display: block; width: 100%; padding: 12px; margin: 10px 0; background: #2e7d32; color: white; border: none;
            border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; font-family: inherit; box-shadow: 0 4px #1b5e20;
        }
        .main-btn:active { transform: translateY(2px); box-shadow: 0 2px #1b5e20; }
        
        #top-bar {
            position: absolute; top: 10px; width: 95%; max-width: 380px;
            display: flex; flex-direction: column; gap: 5px; align-items: center; z-index: 15; pointer-events: none; display: none;
        }
        .hud-row { display: flex; width: 100%; justify-content: space-between; align-items: center; }
        #match-timer, #score-board, #shot-timer-ui {
            background: rgba(0, 0, 0, 0.85); padding: 6px 12px; border-radius: 4px;
            font-size: 18px; font-weight: bold; border: 2px solid #fff; text-align: center;
        }
        #match-timer { color: #f1c40f; border-color: #f1c40f; }
        #score-board { color: #fff; min-width: 70px; }
        #shot-timer-ui { color: #2ecc71; border-color: #2ecc71; }
        
        #exit-btn {
            background: #c0392b; color: white; border: 2px solid #fff; border-radius: 4px;
            font-size: 13px; font-weight: bold; cursor: pointer; pointer-events: auto;
            padding: 6px 12px; font-family: inherit;
        }
        #start-match-btn {
            background: #27ae60; color: white; border: 2px solid #fff; border-radius: 4px;
            font-size: 13px; font-weight: bold; cursor: pointer; pointer-events: auto;
            padding: 6px 12px; font-family: inherit; display: none;
        }

        #goal-banner {
            position: absolute; top: 40%; font-size: 70px; font-weight: 900;
            text-shadow: 4px 4px 0px #000, -2px -2px 0px #000;
            color: #1976d2; z-index: 30; pointer-events: none; display: none;
            font-style: italic; font-family: sans-serif;
            animation: goalPop 0.5s ease-out infinite alternate;
        }
        #goal-banner::before { content: "GOAL!"; position: absolute; left: -5px; top: -5px; color: #f1c40f; z-index: -1; }
        @keyframes goalPop { 0% { transform: scale(0.9) rotate(-5deg); } 100% { transform: scale(1.1) rotate(5deg); } }

        canvas { background: #2e7d32; border: 10px solid #1b5e20; border-radius: 8px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <!-- ANA MENÜ -->
    <div id="menu">
        <h1>ÇİVİLİ FUTBOL</h1>
        <div class="input-group">
            <label>OYUNCU İSMİ</label>
            <input type="text" id="player-name" value="Oyuncu 1" maxlength="12">
        </div>
        <div class="input-group">
            <label>MAÇ SÜRESİ</label>
            <select id="match-duration">
                <option value="2">2 Dakika</option>
                <option value="3">3 Dakika</option>
                <option value="5">5 Dakika</option>
            </select>
        </div>
        <button class="main-btn" onclick="startSetupPhase('ai')">🤖 Oyuna Başla (Diziliş Ekranı)</button>
    </div>

    <!-- ÜST HUD PANELİ -->
    <div id="top-bar">
        <div class="hud-row">
            <button id="exit-btn" onclick="exitToMenu()">ÇIKIŞ</button>
            <div id="match-timer">02:00</div>
            <div id="score-board">0 - 0</div>
            <div id="shot-timer-ui">3.0</div>
            <button id="start-match-btn" onclick="confirmFormationsAndStart()">BAŞLAT</button>
        </div>
    </div>

    <div id="goal-banner">GOAL!</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const width = Math.min(window.innerWidth - 20, 360);
        const height = Math.min(window.innerHeight - 80, 620);
        canvas.width = width; canvas.height = height;

        // Ses Sentezleyici
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playKickSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'triangle'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.12);
            gain.gain.setValueAtTime(0.6, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.12);
            osc.start(); osc.stop(audioCtx.currentTime + 0.12);
        }
        function playGoalSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            let now = audioCtx.currentTime;
            [300, 400, 500].forEach((f, i) => {
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.frequency.setValueAtTime(f, now + i*0.1); gain.gain.setValueAtTime(0.3, now + i*0.1);
                gain.gain.exponentialRampToValueAtTime(0.01, now + i*0.1 + 0.15);
                osc.start(now + i*0.1); osc.stop(now + i*0.1 + 0.15);
            });
        }

        // Oyun Durumları: 'menu', 'setup', 'playing'
        let currentPhase = 'menu'; 
        let gameMode = 'ai';
        let score = { p1: 0, p2: 0 };
        let turn = 1;
        let matchTimeRemaining = 120;
        let matchInterval = null;
        let shotTimeLeft = 3.0;
        let shotTimerInterval = null;

        let cap = { x: width/2, y: height/2, vx: 0, vy: 0, radius: 11, friction: 0.983, rotation: 0 };
        let pins = []; // Sahadaki oyuncular
        let benchPins = []; // Yedek kulübesindeki (yerleştirilmeyi bekleyen) oyuncular
        
        let selectedPin = null; 
        let isDraggingBall = false;
        let dragStart = { x: 0, y: 0 }, dragCurrent = { x: 0, y: 0 };

        const ballDiameter = cap.radius * 2;
        const minAllowedDistance = ballDiameter * 2.5; // Kural: En az 2.5 top mesafe (55px)

        // Sahadaki Statik Ölçüler
        const goalWidth = cap.radius * 2 * 3.2, goalHeight = 12;
        const penaltyBoxW = goalWidth * 2.2, penaltyBoxH = height * 0.15;
        const pBoxX1 = (width - penaltyBoxW) / 2, pBoxX2 = pBoxX1 + penaltyBoxW;
        
        // P1 ve P2 Ceza Sahaları Y sınırları
        const p1BoxY1 = height - penaltyBoxH, p1BoxY2 = height;
        const p2BoxY1 = 0, p2BoxY2 = penaltyBoxH;

        // Yedek Kulübesi Alanı (Taktik Ekranı Üst Bölümü)
        const benchY = 45;

        function startSetupPhase(mode) {
            gameMode = mode;
            currentPhase = 'setup';
            score = { p1: 0, p2: 0 };
            document.getElementById('score-board').innerText = "0 - 0";
            document.getElementById('menu').style.display = 'none';
            document.getElementById('top-bar').style.display = 'flex';
            document.getElementById('start-match-btn').style.display = 'block';
            document.getElementById('start-match-btn').style.opacity = '0.5';

            pins = [
                {x: (width - goalWidth)/2, y: goalHeight, isPost: true}, {x: (width + goalWidth)/2, y: goalHeight, isPost: true},
                {x: (width - goalWidth)/2, y: height - goalHeight, isPost: true}, {x: (width + goalWidth)/2, y: height - goalHeight, isPost: true}
            ];

            // P1 (Oyuncu) için 11 adet pulu yedek kulübesine diz
            benchPins = [];
            for(let i=0; i<11; i++) {
                benchPins.push({
                    id: i,
                    x: 25 + i * ((width - 40) / 10),
                    y: benchY,
                    homeX: 25 + i * ((width - 40) / 10),
                    homeY: benchY,
                    team: 1,
                    onField: false
                });
            }

            // P2 (Yapay Zeka) otomatik kurallara uygun dizilsin
            generateAIFormation();

            cap.x = width/2; cap.y = height/2; cap.vx = 0; cap.vy = 0;
            animate();
        }

        function generateAIFormation() {
            let aiPositions = [
                {x: width/2, y: height*0.12}, // Kaleci (Ceza sahası içi)
                {x: width*0.2, y: height*0.26}, {x: width*0.5, y: height*0.24}, {x: width*0.8, y: height*0.26},
                {x: width*0.15, y: height*0.38}, {x: width*0.38, y: height*0.38}, {x: width*0.62, y: height*0.38}, {x: width*0.85, y: height*0.38},
                {x: width*0.3, y: height*0.48}, {x: width*0.7, y: height*0.48}, {x: width/2, y: height*0.58}
            ];
            aiPositions.forEach(pos => {
                pins.push({ x: pos.x, y: pos.y, team: 2 });
            });
        }

        function checkFormationsReady() {
            const allPlaced = benchPins.every(p => p.onField);
            const btn = document.getElementById('start-match-btn');
            if (allPlaced) {
                btn.style.opacity = '1';
            } else {
                btn.style.opacity = '0.5';
            }
        }

        function confirmFormationsAndStart() {
            if (!benchPins.every(p => p.onField)) {
                alert("Lütfen yukarıdaki tüm oyuncularınızı sürükleyerek sahaya yerleştirin!");
                return;
            }
            
            // Yedek kulübesindeki oyuncuları kalıcı sahaya aktar
            benchPins.forEach(p => {
                pins.push({ x: p.x, y: p.y, team: 1 });
            });
            benchPins = [];

            document.getElementById('start-match-btn').style.display = 'none';
            currentPhase = 'playing';
            turn = 1;
            
            matchTimeRemaining = parseInt(document.getElementById('match-duration').value) * 60;
            
            clearInterval(matchInterval);
            matchInterval = setInterval(() => {
                matchTimeRemaining--;
                const m = Math.floor(matchTimeRemaining / 60).toString().padStart(2, '0');
                const s = (matchTimeRemaining % 60).toString().padStart(2, '0');
                document.getElementById('match-timer').innerText = `${m}:${s}`;
                
                if(matchTimeRemaining <= 0) {
                    currentPhase = 'menu';
                    alert(`Maç bitti! Skor: ${score.p1} - ${score.p2}`);
                    exitToMenu();
                }
            }, 1000);

            resetShotTimer();
        }

        function isInsideP1PenaltyBox(x, y) {
            return (x >= pBoxX1 && x <= pBoxX2 && y >= p1BoxY1 && y <= p1BoxY2);
        }

        function countPlayersInP1PenaltyBox(excludeId) {
            let count = 0;
            benchPins.forEach(p => {
                if(p.onField && p.id !== excludeId && isInsideP1PenaltyBox(p.x, p.y)) {
                    count++;
                }
            });
            return count;
        }

        function resetShotTimer() {
            clearInterval(shotTimerInterval);
            if (currentPhase !== 'playing') return;
            shotTimeLeft = 3.0;
            updateShotTimerUI();

            shotTimerInterval = setInterval(() => {
                if (Math.hypot(cap.vx, cap.vy) < 0.15) {
                    shotTimeLeft -= 0.1;
                    if (shotTimeLeft <= 0) {
                        shotTimeLeft = 0;
                        updateShotTimerUI();
                        turn = turn === 1 ? 2 : 1;
                        resetShotTimer();
                    } else {
                        updateShotTimerUI();
                    }
                }
            }, 100);
        }

        function updateShotTimerUI() {
            const ui = document.getElementById('shot-timer-ui');
            ui.innerText = shotTimeLeft.toFixed(1);
            if (shotTimeLeft > 1.5) { ui.style.color = '#2ecc71'; ui.style.borderColor = '#2ecc71'; }
            else if (shotTimeLeft > 0.7) { ui.style.color = '#f1c40f'; ui.style.borderColor = '#f1c40f'; }
            else { ui.style.color = '#e74c3c'; ui.style.borderColor = '#e74c3c'; }
        }

        function triggerGoalAnimation(scoringTeam) {
            playGoalSound();
            if(scoringTeam === 1) score.p1++;
            else score.p2++;
            document.getElementById('score-board').innerText = `${score.p1} - ${score.p2}`;

            const banner = document.getElementById('goal-banner');
            banner.style.display = 'block';
            setTimeout(() => { banner.style.display = 'none'; }, 2000);
        }

        function exitToMenu() {
            currentPhase = 'menu';
            clearInterval(matchInterval);
            clearInterval(shotTimerInterval);
            document.getElementById('menu').style.display = 'block';
            document.getElementById('top-bar').style.display = 'none';
            document.getElementById('goal-banner').style.display = 'none';
            ctx.clearRect(0, 0, width, height);
        }

        function getCanvasTouchPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        canvas.addEventListener('mousedown', (e) => {
            const pos = getCanvasTouchPos(e);

            if (currentPhase === 'setup') {
                // Taktik aşamasında yukarıdaki veya sahadaki pulları seçme
                for (let p of benchPins) {
                    if (Math.hypot(pos.x - p.x, pos.y - p.y) < 16) {
                        selectedPin = p;
                        break;
                    }
                }
            } 
            else if (currentPhase === 'playing') {
                if (turn === 2 || Math.hypot(cap.vx, cap.vy) > 0.2) return;
                if (Math.hypot(pos.x - cap.x, pos.y - cap.y) < 45) {
                    isDraggingBall = true;
                    dragStart = { x: cap.x, y: cap.y };
                    dragCurrent = pos;
                }
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            const pos = getCanvasTouchPos(e);
            
            if (currentPhase === 'setup' && selectedPin) {
                selectedPin.x = pos.x;
                selectedPin.y = pos.y;
            } 
            else if (currentPhase === 'playing' && isDraggingBall) {
                dragCurrent = pos;
            }
        });

        window.addEventListener('mouseup', () => {
            if (currentPhase === 'setup' && selectedPin) {
                // Bırakılan yer kurallara uyuyor mu?
                let valid = true;

                // Kural 1: Sadece sahanın kendi yarı alanına (alt yarıya) koyulabilir
                if (selectedPin.y < height / 2) {
                    valid = false;
                }

                // Kural 2: En az 2.5 top mesafe kontrolü
                if (valid) {
                    for (let p of benchPins) {
                        if (p.id !== selectedPin.id && p.onField) {
                            if (Math.hypot(selectedPin.x - p.x, selectedPin.y - p.y) < minAllowedDistance) {
                                valid = false;
                                break;
                            }
                        }
                    }
                }

                // Kural 3: Ceza sahası içine maksimum 1 oyuncu
                if (valid && isInsideP1PenaltyBox(selectedPin.x, selectedPin.y)) {
                    if (countPlayersInP1PenaltyBox(selectedPin.id) >= 1) {
                        valid = false;
                    }
                }

                if (valid) {
                    selectedPin.onField = true;
                } else {
                    // Kurallara uyulmadıysa kulübeye geri yolla
                    selectedPin.x = selectedPin.homeX;
                    selectedPin.y = selectedPin.homeY;
                    selectedPin.onField = false;
                }

                selectedPin = null;
                checkFormationsReady();
            } 
            
            if (currentPhase === 'playing' && isDraggingBall) {
                isDraggingBall = false;
                cap.vx = (dragStart.x - dragCurrent.x) * 0.13;
                cap.vy = (dragStart.y - dragCurrent.y) * 0.13;
                playKickSound();
                turn = 2;
                resetShotTimer();
            }
        });

        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); canvas.dispatchEvent(new MouseEvent('mousedown', { clientX: e.touches[0].clientX, clientY: e.touches[0].clientY })); }, {passive:false});
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); canvas.dispatchEvent(new MouseEvent('mousemove', { clientX: e.touches[0].clientX, clientY: e.touches[0].clientY })); }, {passive:false});
        window.addEventListener('touchend', () => window.dispatchEvent(new MouseEvent('mouseup')));

        function makeAIMove() {
            if(currentPhase !== 'playing') return;
            const targetX = width / 2 + (Math.random() - 0.5) * (goalWidth * 0.8);
            const dx = targetX - cap.x, dy = height - cap.y;
            const angle = Math.atan2(dy, dx);
            const speed = 7 + Math.random() * 5;
            cap.vx = Math.cos(angle) * speed; cap.vy = Math.sin(angle) * speed;
            playKickSound();
            turn = 1;
            resetShotTimer();
        }

        function updatePhysics() {
            if(currentPhase !== 'playing') return;
            
            cap.x += cap.vx; cap.y += cap.vy;
            cap.vx *= cap.friction; cap.vy *= cap.friction;

            const isMoving = Math.hypot(cap.vx, cap.vy) > 0.15;
            if (isMoving) {
                cap.rotation += (Math.sign(cap.vx) * Math.abs(cap.vx) + Math.sign(cap.vy) * Math.abs(cap.vy)) * 0.05;
            }

            if (cap.x - cap.radius < 0) { cap.x = cap.radius; cap.vx *= -0.85; }
            if (cap.x + cap.radius > width) { cap.x = width - cap.radius; cap.vx *= -0.85; }
            
            if (cap.y - cap.radius < 0 || cap.y + cap.radius > height) {
                if (cap.x > (width - goalWidth)/2 && cap.x < (width + goalWidth)/2) {
                    if (cap.y < 0) triggerGoalAnimation(1);
                    if (cap.y > height) triggerGoalAnimation(2);
                    
                    cap.x = width/2; cap.y = height/2; cap.vx = 0; cap.vy = 0;
                    resetShotTimer();
                    return;
                } else {
                    if (cap.y - cap.radius < 0) { cap.y = cap.radius; cap.vy *= -0.85; }
                    if (cap.y + cap.radius > height) { cap.y = height - cap.radius; cap.vy *= -0.85; }
                }
            }

            pins.forEach(pin => {
                const dist = Math.hypot(cap.x - pin.x, cap.y - pin.y);
                const pinRadius = pin.isPost ? 4 : 8;
                const minDist = cap.radius + pinRadius;
                if (dist < minDist) {
                    const angle = Math.atan2(cap.y - pin.y, cap.x - pin.x);
                    cap.x = pin.x + Math.cos(angle) * minDist; cap.y = pin.y + Math.sin(angle) * minDist;
                    const hitSpeed = Math.hypot(cap.vx, cap.vy);
                    cap.vx = Math.cos(angle) * hitSpeed * 0.85; cap.vy = Math.sin(angle) * hitSpeed * 0.85;
                }
            });

            if (turn === 2 && !isMoving && shotTimeLeft === 3.0) {
                setTimeout(makeAIMove, 600);
            }
        }

        function drawRetroPlayer(x, y, team) {
            ctx.save(); ctx.translate(x, y);
            if (team === 2) ctx.rotate(Math.PI);
            const bodyColor = (team === 1) ? '#0044ff' : '#cc0000';
            const skinColor = '#ffad87', hairColor = '#111111';

            ctx.fillStyle = bodyColor;
            ctx.fillRect(-14, -4, 5, 4); ctx.fillRect(9, -4, 5, 4);
            ctx.fillStyle = skinColor;
            ctx.fillRect(-14, -8, 4, 4); ctx.fillRect(10, -8, 4, 4);
            ctx.fillStyle = bodyColor;
            ctx.fillRect(-9, -2, 18, 7); ctx.fillRect(-6, 5, 12, 4);
            ctx.fillStyle = skinColor; ctx.fillRect(-3, -5, 6, 4);
            ctx.fillStyle = hairColor; ctx.fillRect(-4, 4, 8, 7);
            ctx.restore();
        }

        function drawSoccerBall(x, y, r, rotation) {
            ctx.save(); ctx.translate(x, y); ctx.rotate(rotation);
            ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
            ctx.lineWidth = 1.5; ctx.strokeStyle = '#000'; ctx.stroke();
            ctx.fillStyle = '#111'; ctx.beginPath();
            for (let i = 0; i < 5; i++) {
                let a = (Math.PI * 2 / 5) * i - Math.PI / 2;
                ctx.lineTo(Math.cos(a) * (r * 0.4), Math.sin(a) * (r * 0.4));
            }
            ctx.closePath(); ctx.fill(); ctx.stroke(); ctx.restore();
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            
            // Saha Çizgileri
            ctx.strokeStyle = "rgba(255,255,255,0.35)"; ctx.lineWidth = 2.5;
            ctx.beginPath(); ctx.moveTo(0, height/2); ctx.lineTo(width, height/2); ctx.stroke();
            ctx.beginPath(); ctx.arc(width/2, height/2, 45, 0, Math.PI*2); ctx.stroke();
            
            // Ceza Sahaları
            ctx.strokeRect(pBoxX1, 0, penaltyBoxW, penaltyBoxH);
            ctx.strokeRect(pBoxX1, height - penaltyBoxH, penaltyBoxW, penaltyBoxH);

            // Taktik Aşaması Yedek Kulübesi Çizgisi
            if (currentPhase === 'setup') {
                ctx.fillStyle = "rgba(0,0,0,0.4)";
                ctx.fillRect(0, 0, width, 70);
                ctx.strokeStyle = "#f1c40f"; ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.moveTo(0, 70); ctx.lineTo(width, 70); ctx.stroke();
                
                // Oyuncuların yerleşeceği kendi alan sınırını (alt yarıyı) hafifçe renklendir
                ctx.fillStyle = "rgba(39, 174, 96, 0.15)";
                ctx.fillRect(0, height/2, width, height/2);
            }

            // Aktif Sahadaki Oyuncular ve Direkler
            pins.forEach(pin => {
                if(pin.isPost) {
                    ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(pin.x, pin.y, 4, 0, Math.PI * 2); ctx.fill();
                } else {
                    drawRetroPlayer(pin.x, pin.y, pin.team);
                }
            });

            // Yedek Kulübesi/Dizilim Aşamasındaki Oyuncular
            if (currentPhase === 'setup') {
                benchPins.forEach(p => {
                    drawRetroPlayer(p.x, p.y, p.team);
                });
            }

            // Şut Çizgisi
            if (currentPhase === 'playing' && isDraggingBall) {
                ctx.strokeStyle = '#0044ff'; ctx.lineWidth = 4;
                ctx.beginPath(); ctx.moveTo(cap.x, cap.y);
                ctx.lineTo(cap.x + (dragStart.x - dragCurrent.x), cap.y + (dragStart.y - dragCurrent.y));
                ctx.stroke();
            }

            // Top
            if (currentPhase === 'playing') {
                drawSoccerBall(cap.x, cap.y, cap.radius, cap.rotation);
            }
        }

        function animate() {
            if (currentPhase === 'menu') return;
            updatePhysics();
            draw();
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
