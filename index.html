<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Çivili Futbol</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js" defer></script>
    <script src="game.js" defer></script>
</head>
<body>

    <!-- ===== ANA MENÜ ===== -->
    <div id="menu">
        <!-- ARKA PLAN -->
        <div class="menu-bg"></div>
        
        <!-- MENÜ İÇERİĞİ -->
        <div class="menu-content">
            
            <!-- BAŞLIK -->
            <div class="menu-title">
                <img src="butonlar/logo-alani.webp" alt="ÇİVİLİ FUTBOL" class="title-img" 
                     onerror="this.onerror=null; this.style.display='none'; document.getElementById('title-fallback').style.display='block'">
                <div id="title-fallback" style="display:none; color:#2ecc71; font-size:28px; font-weight:bold; letter-spacing:4px;">ÇİVİLİ FUTBOL</div>
            </div>

            <!-- İSMİNİ GİR -->
            <div class="input-group">
                <img src="butonlar/ismini-gir.webp" alt="İSMİNİ GİR" class="label-img" 
                     onerror="this.onerror=null; this.style.display='none'; document.getElementById('label-fallback').style.display='block'">
                <div id="label-fallback" style="display:none; color:#aaa; font-size:13px; letter-spacing:3px; text-align:center;">İSMİNİ GİR:</div>
                <div class="input-line">
                    <input type="text" id="player-name" value="Oyuncu" maxlength="12" onchange="updatePlayerName()">
                </div>
            </div>

            <!-- TAKIM SEÇ -->
            <button class="menu-btn-img" onclick="toggleTeamSelect()">
                <img src="butonlar/takim-sec.webp" alt="TAKIM SEÇ" 
                     onerror="this.onerror=null; this.style.display='none'; this.nextElementSibling.style.display='block'">
                <span style="display:none; padding:12px; background:rgba(0,0,0,0.3); border:2px solid rgba(74,117,74,0.3); border-radius:8px; color:white; font-size:14px; letter-spacing:3px; font-weight:bold; font-family:'Courier New',monospace;">TAKIM SEÇ</span>
            </button>

            <!-- TAKIM LOGO SEÇİM ALANI -->
            <div class="team-logo-container" id="team-logo-container" style="display: none;">
                <div class="team-logo-options" id="team-logo-options"></div>
                <div style="text-align:center; margin-top:6px; font-size:11px; color:#888;">
                    Seçili: <span id="selected-team-name-display" style="color:#2ecc71;">Varsayılan</span>
                </div>
            </div>

            <!-- BİLGİSAYARA KARŞI -->
            <button class="menu-btn-img" onclick="openAILevelMenu()">
                <img src="butonlar/bilgisayara-karsi.webp" alt="BİLGİSAYARA KARŞI" 
                     onerror="this.onerror=null; this.style.display='none'; this.nextElementSibling.style.display='block'">
                <span style="display:none; padding:12px; background:rgba(0,0,0,0.3); border:2px solid rgba(74,117,74,0.3); border-radius:8px; color:white; font-size:14px; letter-spacing:3px; font-weight:bold; font-family:'Courier New',monospace;">BİLGİSAYARA KARŞI</span>
            </button>

            <!-- 2 KİŞİLİK -->
            <button class="menu-btn-img" onclick="openLocalTeamSelect()">
                <img src="butonlar/2kisi-ayni-ekran.webp" alt="2 KİŞİLİK AYNI EKRAN" 
                     onerror="this.onerror=null; this.style.display='none'; this.nextElementSibling.style.display='block'">
                <span style="display:none; padding:12px; background:rgba(0,0,0,0.3); border:2px solid rgba(74,117,74,0.3); border-radius:8px; color:white; font-size:14px; letter-spacing:3px; font-weight:bold; font-family:'Courier New',monospace;">2 KİŞİLİK AYNI EKRAN</span>
            </button>

            <!-- ONLINE MAÇ -->
            <button class="menu-btn-img" onclick="openOnlineLobby()">
                <img src="butonlar/online-mac.webp" alt="ONLINE MAÇ" 
                     onerror="this.onerror=null; this.style.display='none'; this.nextElementSibling.style.display='block'">
                <span style="display:none; padding:12px; background:rgba(0,0,0,0.3); border:2px solid rgba(74,117,74,0.3); border-radius:8px; color:white; font-size:14px; letter-spacing:3px; font-weight:bold; font-family:'Courier New',monospace;">ONLINE MAÇ</span>
            </button>

            <!-- AYARLAR -->
            <button class="menu-btn-img settings-btn" onclick="openSettingsPopup()">
                <img src="butonlar/ayarlar.webp" alt="AYARLAR" 
                     onerror="this.onerror=null; this.style.display='none'; this.nextElementSibling.style.display='block'">
                <span style="display:none; padding:12px; background:rgba(0,0,0,0.3); border:2px solid rgba(85,85,85,0.3); border-radius:8px; color:#888; font-size:12px; letter-spacing:4px; font-weight:bold; font-family:'Courier New',monospace;">AYARLAR</span>
            </button>
            
        </div>
    </div>

    <!-- ===== AYARLAR POP-UP ===== -->
    <div id="settings-popup" style="display: none;" onclick="if(event.target===this) closeSettingsPopup()">
        <div class="popup-content">
            <div class="popup-header">
                <h2>AYARLAR</h2>
                <button class="popup-close" onclick="closeSettingsPopup()">✕</button>
            </div>
            <div class="popup-body">
                <div class="input-group">
                    <label>MAÇ SÜRESİ</label>
                    <select id="match-duration">
                        <option value="60">1 Dakika</option>
                        <option value="90" selected>1.5 Dakika</option>
                        <option value="120">2 Dakika</option>
                        <option value="180">3 Dakika</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>SAHA RENGİ</label>
                    <div class="color-options">
                        <button class="color-btn active" data-field="#2e7d32" style="background:#2e7d32" onclick="selectFieldColor('#2e7d32')"></button>
                        <button class="color-btn" data-field="#1a5276" style="background:#1a5276" onclick="selectFieldColor('#1a5276')"></button>
                        <button class="color-btn" data-field="#7d6608" style="background:#7d6608" onclick="selectFieldColor('#7d6608')"></button>
                        <button class="color-btn" data-field="#6c3483" style="background:#6c3483" onclick="selectFieldColor('#6c3483')"></button>
                        <button class="color-btn" data-field="#1a1a1a" style="background:#1a1a1a; border-color:#555" onclick="selectFieldColor('#1a1a1a')"></button>
                    </div>
                </div>
            </div>
            <div class="popup-footer">
                <button class="popup-close-btn" onclick="closeSettingsPopup()">TAMAM</button>
            </div>
        </div>
    </div>

    <!-- ===== AI ZORLUK POP-UP ===== -->
    <div id="ai-level-menu" style="display: none;" onclick="if(event.target===this) closeAILevelMenu()">
        <div class="popup-content">
            <div class="popup-header">
                <h2>ZORLUK SEVİYESİ</h2>
                <button class="popup-close" onclick="closeAILevelMenu()">✕</button>
            </div>
            <div class="popup-body">
                <button class="menu-btn" onclick="startLocalGame('ai', 'kolay')">Kolay</button>
                <button class="menu-btn" onclick="startLocalGame('ai', 'orta')">Orta</button>
                <button class="menu-btn" onclick="startLocalGame('ai', 'zor')">Zor</button>
                <button class="menu-btn" onclick="startLocalGame('ai', 'usta')">Usta</button>
            </div>
        </div>
    </div>

    <!-- ===== ONLINE LOBI POP-UP ===== -->
    <div id="online-lobby" style="display: none;" onclick="if(event.target===this) closeOnlineLobby()">
        <div class="popup-content">
            <div class="popup-header">
                <h2>ONLINE HAVUZ</h2>
                <button class="popup-close" onclick="closeOnlineLobby()">✕</button>
            </div>
            <div class="popup-body">
                <p style="font-size: 11px; color: #ccc; margin-bottom: 10px;">Maç yapmak istediğiniz kişiye tıklayarak davet gönderin</p>
                <div class="player-list" id="lobby-list">
                    <div style="padding:15px;color:#888;text-align:center;">Havuz güncelleniyor...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== 2 KİŞİLİK TAKIM SEÇ POP-UP ===== -->
    <div id="local-team-select" style="display: none;" onclick="if(event.target===this) closeLocalTeamSelect()">
        <div class="popup-content">
            <div class="popup-header">
                <h2>TAKIM SEÇİMİ</h2>
                <button class="popup-close" onclick="closeLocalTeamSelect()">✕</button>
            </div>
            <div class="popup-body">
                <div class="player-team-select">
                    <h3 style="color: #3498db;">Oyuncu 1</h3>
                    <div class="team-logo-options" id="local-player1-logos"></div>
                </div>
                <div style="border-top: 1px solid #333; margin: 12px 0;"></div>
                <div class="player-team-select">
                    <h3 style="color: #e74c3c;">Oyuncu 2</h3>
                    <div class="team-logo-options" id="local-player2-logos"></div>
                </div>
                <div style="margin-top: 12px; text-align: center; font-size: 12px; color: #888;">
                    Seçili: <span id="local-p1-name" style="color: #3498db; font-weight: bold;">Seçilmedi</span> vs <span id="local-p2-name" style="color: #e74c3c; font-weight: bold;">Seçilmedi</span>
                </div>
            </div>
            <div class="popup-footer">
                <button class="popup-close-btn" onclick="startLocalGameWithTeams()">MAÇA BAŞLA</button>
            </div>
        </div>
    </div>

    <!-- ===== OYUN EKRANI ===== -->
    <div id="top-bar" style="display: none;">
        <div class="hud-row">
            <button id="exit-btn" onclick="exitToMenu()">✕</button>
            <div id="score-board">
                <div class="team-score">
                    <img id="score-logo-p1" src="takimlar/default.png" alt="Takım 1" class="score-logo">
                    <span id="score-p1">0</span>
                </div>
                <span id="score-divider">-</span>
                <div class="team-score">
                    <span id="score-p2">0</span>
                    <img id="score-logo-p2" src="takimlar/default.png" alt="Takım 2" class="score-logo">
                </div>
            </div>
            <div id="time-board">90s</div>
        </div>
        <div class="hud-row-second">
            <div id="turn-indicator">Diziliş</div>
            <div id="shot-timer">ŞUT: 3s</div>
        </div>
    </div>

    <!-- ===== CANVAS VE BUTON ===== -->
    <div class="canvas-container">
        <canvas id="gameCanvas"></canvas>
        <button id="start-match-btn" onclick="confirmFormationsAndStart()">BAŞLAT</button>
    </div>

    <!-- ===== GÜÇ GÖSTERGESİ ===== -->
    <div id="power-bar-container">
        <div id="power-bar"></div>
    </div>

</body>
</html>
