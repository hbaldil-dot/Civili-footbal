<!DOCTYPE <!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Çivili Futbol - Klasik & Online</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        body {
            background: #111; font-family: 'Courier New', Courier, monospace; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white;
        }
        
        /* ANA MENÜ */
        #menu {
            position: absolute; background: rgba(20, 30, 20, 0.98); border: 4px solid #4a754a;
            border-radius: 12px; padding: 25px; text-align: center; z-index: 100; width: 90%; max-width: 360px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); display: block;
        }
        h1 { color: #2ecc71; margin-bottom: 15px; font-size: 24px; text-shadow: 2px 2px black; font-weight: bold; }
        .input-group { margin-bottom: 14px; text-align: left; }
        .input-group label { font-size: 11px; color: #2ecc71; font-weight: bold; display: block; margin-bottom: 4px; letter-spacing: 1px; }
        input, select {
            width: 100%; padding: 10px; border-radius: 4px; border: 2px solid #4a754a; background: #1a1a1a; color: white; font-size: 14px; font-family: inherit;
        }
        .mode-container { margin-top: 15px; display: flex; flex-direction: column; gap: 8px; }
        .main-btn {
            display: block; width: 100%; padding: 12px; background: #2e7d32; color: white; border: none;
            border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; font-family: inherit; box-shadow: 0 4px #1b5e20;
            text-align: center;
        }
        .main-btn:active { transform: translateY(2px); box-shadow: 0 2px #1b5e20; }
        .btn-local { background: #3498db; box-shadow: 0 4px #2980b9; }
        .btn-ai { background: #e67e22; box-shadow: 0 4px #d35400; }
        .btn-online { background: #8e44ad; box-shadow: 0 4px #6c3483; }

        /* GERÇEK LOBİ PANELİ */
        #online-lobby {
            position: absolute; background: rgba(20, 20, 30, 0.98); border: 4px solid #6c3483;
            border-radius: 12px; padding: 20px; text-align: center; z-index: 110; width: 90%; max-width: 360px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.9); display: none;
        }
        #online-lobby h2 { color: #9b59b6; margin-bottom: 15px; font-size: 20px; text-shadow: 1px 1px black; }
        .player-list {
            background: #111; border: 2px solid #444; border-radius: 6px; 
            max-height: 180px; overflow-y: auto; margin-bottom: 15px; text-align: left;
        }
        .player-item {
            padding: 10px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; transition: background 0.2s;
        }
        .player-item:hover { background: #2c1d3a; }
        .player-item .status { font-size: 11px; padding: 4px 8px; border-radius: 3px; font-weight: bold; background: #27ae60; color: white; }
        .lobby-close-btn {
            width: 100%; padding: 10px; background: #c0392b; color: white; border: none; border-radius: 6px;
            font-weight: bold; cursor: pointer; font-family: inherit;
        }

        /* OYUN ÜST HUD BARI */
        #top-bar {
            position: absolute; top: 10px; width: 95%; max-width: 380px;
            display: flex; flex-direction: column; gap: 5px; align-items: center; z-index: 15; pointer-events: none; display: none;
        }
        .hud-row { display: flex; width: 100%; justify-content: space-between; align-items: center; gap: 5px; }
        #score-board, #turn-indicator, #time-board, #shot-timer {
            background: rgba(0, 0, 0, 0.85); padding: 6px 10px; border-radius: 4px;
            font-size: 13px; font-weight: bold; border: 2px solid #fff; text-align: center;
        }
        #turn-indicator { color: #f1c40f; border-color: #f1c40f; min-width: 90px; }
        #time-board { color: #3498db; border-color: #3498db; }
        #shot-timer { color: #e74c3c; border-color: #e74c3c; min-width: 60px; display: none; }
        
        #exit-btn, #start-match-btn {
            color: white; border: 2px solid #fff; border-radius: 4px;
            font-size: 13px; font-weight: bold; cursor: pointer; pointer-events: auto;
            padding: 6px 12px; font-family: inherit;
        }
        #exit-btn { background: #c0392b; }
        #start-match-btn { background: #27ae60; display: none; }

        canvas { background: #2e7d32; border: 10px solid #1b5e20; border-radius: 8px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <!-- MENÜ -->
    <div id="menu">
        <h1>ÇİVİLİ FUTBOL</h1>
        <div class="input-group">
            <label>OYUNCU İSMİ</label>
            <input type="text" id="player-name" value="Oyuncu" maxlength="12">
        </div>
        <div class="input-group">
            <label>MAÇ SÜRESİ</label>
            <select id="match-duration">
                <option value="60">1 Dakika (60s)</option>
                <option value="90" selected>1.5 Dakika (90s)</option>
                <option value="120">2 Dakika (120s)</option>
            </select>
        </div>
        <div class="mode-container">
            <button class="main-btn btn-ai" onclick="startLocalGame('ai')">🤖 Bilgisayara Karşı</button>
            <button class="main-btn btn-local" onclick="startLocalGame('local')">👥 2 Oyuncu (Aynı Ekran)</button>
            <button class="main-btn btn-online" onclick="openOnlineLobby()">🌐 Çevrimiçi Havuza Gir</button>
        </div>
    </div>

    <!-- ONLINE OYUNCU HAVUZU -->
    <div id="online-lobby">
        <h2>ÇEVRİMİÇİ HAVUZ</h2>
        <p style="font-size: 11px; color: #ccc; margin-bottom: 10px;">Maç yapmak istediğiniz kişiye tıklayarak davet gönderin</p>
        <div class="player-list" id="lobby-list">
            <div style="padding:15px;color:#888;text-align:center;">Havuz güncelleniyor...</div>
        </div>
        <button class="lobby-close-btn" onclick="closeOnlineLobby()">Geri Dön</button>
    </div>

    <!-- ÜST BAR HUD -->
    <div id="top-bar">
        <div class="hud-row">
            <button id="exit-btn" onclick="exitToMenu()">ÇIKIŞ</button>
            <div id="turn-indicator">Diziliş</div>
            <div id="score-board">0 - 0</div>
            <div id="time-board">90s</div>
            <div id="shot-timer">ŞUT: 3s</div>
            <button id="start-match-btn" onclick="confirmFormationsAndStart()">BAŞLAT</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const socket = io();

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const width = 360;
        const height = 620;
        canvas.width = width; canvas.height = height;

        // Oyun durumları
        let currentPhase = 'menu'; // menu, setup, playing, ended
        let gameMode = 'local'; // local, ai, online
        let score = { p1: 0, p2: 0 };
        let turn = 1; // 1: Mavi, 2: Kırmızı
        let myTeamNumber = 1; 
        let currentRoomId = null;

        let matchSecondsLeft = 90;
        let timerInterval = null;
        let shotSecondsLeft = 3;
        let shotTimerInterval = null;

        let cap = { x: width/2, y: height/2, vx: 0, vy: 0, radius: 11, friction: 0.983, rotation: 0 };
        let pins = []; // Sahadaki tüm aktif çiviler (direkler + oyuncular)
        let editableTeam = 1; // Düzenleme aşamasında hangi takımın çivilerini sürükleyebileceğiz?
        let selectedPin = null; 
        let isDraggingBall = false;
        let dragStart = { x: 0, y: 0 }, dragCurrent = { x: 0, y: 0 };

        // 2.5 top boyu sınırı (Top çapı 22px => 2.5 katı 55px)
        const minAllowedDistance = 55; 
        const goalWidth = cap.radius * 2 * 3.2, goalHeight = 12;
        const penaltyBoxW = goalWidth * 2.2, penaltyBoxH = height * 0.15;
        const pBoxX1 = (width - penaltyBoxW) / 2;

        drawFieldLinesOnly();

        function drawFieldLinesOnly() {
            ctx.clearRect(0, 0, width, height);
            ctx.strokeStyle = "rgba(255,255,255,0.35)"; ctx.lineWidth = 2.5;
            ctx.beginPath(); ctx.moveTo(0, height/2); ctx.lineTo(width, height/2); ctx.stroke();
            ctx.beginPath(); ctx.arc(width/2, height/2, 45, 0, Math.PI*2); ctx.stroke();
            ctx.strokeRect(pBoxX1, 0, penaltyBoxW, penaltyBoxH);
            ctx.strokeRect(pBoxX1, height - penaltyBoxH, penaltyBoxW, penaltyBoxH);
        }

        function startLocalGame(mode) {
            gameMode = mode;
            document.getElementById('menu').style.display = 'none';
            document.getElementById('top-bar').style.display = 'flex';
            
            const selectedDuration = parseInt(document.getElementById('match-duration').value);
            matchSecondsLeft = selectedDuration;
            document.getElementById('time-board').innerText = matchSecondsLeft + "s";
            
            startSetupPhase();
        }

        function openOnlineLobby() {
            gameMode = 'online';
            const name = document.getElementById('player-name').value.trim() || "Oyuncu_" + Math.floor(Math.random()*100);
            socket.emit("join-lobby", name);
            document.getElementById('menu').style.display = 'none';
            document.getElementById('online-lobby').style.display = 'block';
        }

        function closeOnlineLobby() {
            socket.emit("leave-lobby");
            document.getElementById('online-lobby').style.display = 'none';
            document.getElementById('menu').style.display = 'block';
        }

        socket.on("update-lobby-players", (players) => {
            const listContainer = document.getElementById('lobby-list');
            listContainer.innerHTML = "";
            let count = 0;

            players.forEach(p => {
                if (p.id !== socket.id) {
                    count++;
                    const item = document.createElement('div');
                    item.className = 'player-item';
                    item.innerHTML = `<span>⚽ ${p.name}</span><span class="status">Davet Et</span>`;
                    item.onclick = () => {
                        alert(`${p.name} kullanıcısına davet gönderildi. Yanıt bekleniyor...`);
                        socket.emit("send-invite", p.id);
                    };
                    listContainer.appendChild(item);
                }
            });

            if (count === 0) {
                listContainer.innerHTML = "<div style='padding:15px;color:#888;text-align:center;'>Havuz boş. Diğer telefondan da girin.</div>";
            }
        });

        socket.on("receive-invite", (data) => {
            if (confirm(`${data.fromName} seni maça davet ediyor! Kabul ediyor musun?`)) {
                socket.emit("accept-invite", data.fromId);
            }
        });

        socket.on("start-online-match", ({ roomId, team }) => {
            currentRoomId = roomId;
            myTeamNumber = team; 
            document.getElementById('online-lobby').style.display = 'none';
            document.getElementById('top-bar').style.display = 'flex';
            
            const selectedDuration = parseInt(document.getElementById('match-duration').value);
            matchSecondsLeft = selectedDuration;
            document.getElementById('time-board').innerText = matchSecondsLeft + "s";

            startSetupPhase();
        });

        socket.on("opponent-disconnected", () => {
            alert("Rakip oyundan ayrıldı.");
            exitToMenu();
        });

        socket.on("match-go", ({ pins: finalPins }) => {
            pins = finalPins;
            currentPhase = 'playing';
            document.getElementById('start-match-btn').style.display = 'none';
            document.getElementById('shot-timer').style.display = 'block';
            updateHUDTurn();
            startMatchTimer();
            resetShotTimer();
            animate();
        });

        socket.on("peerState", (state) => {
            cap.x = state.cap.x; cap.y = state.cap.y;
            cap.vx = state.cap.vx; cap.vy = state.cap.vy;
            cap.rotation = state.cap.rotation;
            turn = state.turn;
            score = state.score;
            document.getElementById('score-board').innerText = `${score.p1} - ${score.p2}`;
            updateHUDTurn();
            resetShotTimer();
        });

        function broadcastState() {
            if(gameMode !== 'online' || currentPhase !== 'playing') return;
            socket.emit('updateState', {
                roomId: currentRoomId,
                state: { 
                    cap: { x: cap.x, y: cap.y, vx: cap.vx, vy: cap.vy, rotation: cap.rotation }, 
                    turn: turn, 
                    score: score 
                }
            });
        }

        // --- SAYAÇLAR ---
        function startMatchTimer() {
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (currentPhase === 'playing') {
                    matchSecondsLeft--;
                    document.getElementById('time-board').innerText = matchSecondsLeft + "s";
                    if (matchSecondsLeft <= 0) {
                        endMatch();
                    }
                }
            }, 1000);
        }

        function resetShotTimer() {
            if(shotTimerInterval) clearInterval(shotTimerInterval);
            shotSecondsLeft = 3;
            document.getElementById('shot-timer').innerText = `ŞUT: ${shotSecondsLeft}s`;

            if (gameMode === 'ai' && turn === 2) {
                document.getElementById('shot-timer').style.display = 'none';
                return;
            } else {
                document.getElementById('shot-timer').style.display = 'block';
            }

            shotTimerInterval = setInterval(() => {
                if (currentPhase === 'playing' && Math.hypot(cap.vx, cap.vy) <= 0.2) {
                    shotSecondsLeft--;
                    document.getElementById('shot-timer').innerText = `ŞUT: ${shotSecondsLeft}s`;

                    if (shotSecondsLeft <= 0) {
                        clearInterval(shotTimerInterval);
                        turn = turn === 1 ? 2 : 1;
                        updateHUDTurn();
                        broadcastState();
                        resetShotTimer();
                    }
                }
            }, 1000);
        }

        function endMatch() {
            currentPhase = 'ended';
            clearInterval(timerInterval);
            clearInterval(shotTimerInterval);
            
            let resultMessage = "Maç Berabere Bitti!";
            if (score.p1 > score.p2) {
                resultMessage = gameMode === 'online' && myTeamNumber === 2 ? "Kaybettiniz!" : "Mavi Takım Kazandı! 🎉";
            } else if (score.p2 > score.p1) {
                resultMessage = gameMode === 'online' && myTeamNumber === 2 ? "Kazandınız! 🎉" : "Kırmızı Takım Kazandı! 🎉";
            }
            
            alert(`SÜRE DOLDU!\nSkor: ${score.p1} - ${score.p2}\n\n${resultMessage}`);
            exitToMenu();
        }

        // --- TAKTİK DİZİLİŞ (4-4-2 HAZIR ŞABLON) ---
        function startSetupPhase() {
            currentPhase = 'setup';
            score = { p1: 0, p2: 0 };
            document.getElementById('score-board').innerText = "0 - 0";
            document.getElementById('start-match-btn').style.display = 'block';
            document.getElementById('start-match-btn').style.opacity = '1';
            document.getElementById('start-match-btn').innerText = "BAŞLAT";
            document.getElementById('start-match-btn').disabled = false;
            document.getElementById('turn-indicator').innerText = "Kadro Ayarla";
            document.getElementById('shot-timer').style.display = 'none';

            editableTeam = (gameMode === 'online') ? myTeamNumber : 1;

            // Sabit Direkler
            pins = [
                {x: (width - goalWidth)/2, y: goalHeight, isPost: true}, {x: (width + goalWidth)/2, y: goalHeight, isPost: true},
                {x: (width - goalWidth)/2, y: height - goalHeight, isPost: true}, {x: (width + goalWidth)/2, y: height - goalHeight, isPost: true}
            ];

            // Mavi Takım (Ev Sahibi - Alt Sahaya Yayılmış 4-4-2)
            const blue442 = [
                {x: width * 0.50, y: height * 0.88, team: 1}, // Kaleci
                {x: width * 0.15, y: height * 0.73, team: 1}, // Sol Bek
                {x: width * 0.38, y: height * 0.77, team: 1}, // Sol Stoper
                {x: width * 0.62, y: height * 0.77, team: 1}, // Sağ Stoper
                {x: width * 0.85, y: height * 0.73, team: 1}, // Sağ Bek
                {x: width * 0.15, y: height * 0.58, team: 1}, // Sol Açık
                {x: width * 0.38, y: height * 0.60, team: 1}, // Sol Orta Saha
                {x: width * 0.62, y: height * 0.60, team: 1}, // Sağ Orta Saha
                {x: width * 0.85, y: height * 0.58, team: 1}, // Sağ Açık
                {x: width * 0.35, y: height * 0.45, team: 1}, // Sol Forvet
                {x: width * 0.65, y: height * 0.45, team: 1}  // Sağ Forvet
            ];

            // Kırmızı Takım (Deplasman - Üst Sahaya Yayılmış 4-4-2)
            const red442 = [
                {x: width * 0.50, y: height * 0.12, team: 2}, // Kaleci
                {x: width * 0.85, y: height * 0.27, team: 2}, // Sol Bek (Rakip açısına göre simetrik)
                {x: width * 0.62, y: height * 0.23, team: 2}, // Sol Stoper
                {x: width * 0.38, y: height * 0.23, team: 2}, // Sağ Stoper
                {x: width * 0.15, y: height * 0.27, team: 2}, // Sağ Bek
                {x: width * 0.85, y: height * 0.42, team: 2}, // Sol Açık
                {x: width * 0.62, y: height * 0.40, team: 2}, // Sol Orta Saha
                {x: width * 0.38, y: height * 0.40, team: 2}, // Sağ Orta Saha
                {x: width * 0.15, y: height * 0.42, team: 2}, // Sağ Açık
                {x: width * 0.65, y: height * 0.55, team: 2}, // Sol Forvet
                {x: width * 0.35, y: height * 0.55, team: 2}  // Sağ Forvet
            ];

            blue442.forEach(p => pins.push(p));
            red442.forEach(p => pins.push(p));

            cap.x = width/2; cap.y = height/2; cap.vx = 0; cap.vy = 0;
            animate();
        }

        function confirmFormationsAndStart() {
            if (gameMode === 'online') {
                document.getElementById('start-match-btn').innerText = "Bekleniyor..";
                document.getElementById('start-match-btn').disabled = true;
                const myPlacedPins = pins.filter(p => p.team === myTeamNumber).map(p => ({ x: p.x, y: p.y }));
                socket.emit("player-ready", { roomId: currentRoomId, team: myTeamNumber, placedPins: myPlacedPins });
            } else {
                currentPhase = 'playing';
                document.getElementById('start-match-btn').style.display = 'none';
                document.getElementById('shot-timer').style.display = 'block';
                updateHUDTurn();
                startMatchTimer();
                resetShotTimer();
                animate();
            }
        }

        function updateHUDTurn() {
            const indicator = document.getElementById('turn-indicator');
            if (gameMode === 'online') {
                if (turn === myTeamNumber) {
                    indicator.innerText = "SIRA SİZDE";
                    indicator.style.borderColor = "#2ecc71"; indicator.style.color = "#2ecc71";
                } else {
                    indicator.innerText = "RAKİPTE";
                    indicator.style.borderColor = "#e74c3c"; indicator.style.color = "#e74c3c";
                }
            } else {
                indicator.innerText = turn === 1 ? "MAVİ SIRA" : "KIRMIZI SIRA";
                indicator.style.borderColor = turn === 1 ? "#3498db" : "#e74c3c";
                indicator.style.color = turn === 1 ? "#3498db" : "#e74c3c";
            }
        }

        // --- YAPAY ZEKA (AI) HAMLESİ ---
        function runAIMove() {
            if (currentPhase !== 'playing' || gameMode !== 'ai' || turn !== 2) return;
            if (Math.hypot(cap.vx, cap.vy) > 0.2) return;

            setTimeout(() => {
                const targetX = width / 2;
                const targetY = height; 
                
                const angle = Math.atan2(targetY - cap.y, targetX - cap.x);
                const power = 4 + Math.random() * 6;

                cap.vx = Math.cos(angle) * power;
                cap.vy = Math.sin(angle) * power;

                turn = 1;
                updateHUDTurn();
                resetShotTimer();
            }, 1000);
        }

        // --- FİZİK DÖNGÜSÜ ---
        function updatePhysics() {
            if(currentPhase !== 'playing') return;
            
            cap.x += cap.vx; cap.y += cap.vy;
            cap.vx *= cap.friction; cap.vy *= cap.friction;

            const isMoving = Math.hypot(cap.vx, cap.vy) > 0.15;
            if (isMoving) {
                cap.rotation += (Math.sign(cap.vx) * Math.abs(cap.vx) + Math.sign(cap.vy) * Math.abs(cap.vy)) * 0.05;
                if(gameMode === 'online' && turn !== myTeamNumber) broadcastState();
            } else {
                if (gameMode === 'ai' && turn === 2) {
                    runAIMove();
                }
            }

            if (cap.x - cap.radius < 0) { cap.x = cap.radius; cap.vx *= -0.85; }
            if (cap.x + cap.radius > width) { cap.x = width - cap.radius; cap.vx *= -0.85; }
            
            if (cap.y - cap.radius <= goalHeight || cap.y + cap.radius >= height - goalHeight) {
                if (cap.x > (width - goalWidth)/2 && cap.x < (width + goalWidth)/2) {
                    if (cap.y < height / 2) {
                        score.p2++; 
                    } else {
                        score.p1++; 
                    }
                    document.getElementById('score-board').innerText = `${score.p1} - `${score.p2}`;
                    cap.x = width/2; cap.y = height/2; cap.vx = 0; cap.vy = 0;
                    broadcastState();
                    resetShotTimer();
                    return;
                } else {
                    if (cap.y - cap.radius < 0) { cap.y = cap.radius; cap.vy *= -0.85; }
                    if (cap.y + cap.radius > height) { cap.y = height - cap.radius; cap.vy *= -0.85; }
                }
            }

            pins.forEach(pin => {
                const dist = Math.hypot(cap.x - pin.x, cap.y - pin.y);
                const pinRadius = pin.isPost ? 4 : 8;
                const minDist = cap.radius + pinRadius;
                if (dist < minDist) {
                    const angle = Math.atan2(cap.y - pin.y, cap.x - pin.x);
                    cap.x = pin.x + Math.cos(angle) * minDist; cap.y = pin.y + Math.sin(angle) * minDist;
                    const hitSpeed = Math.hypot(cap.vx, cap.vy);
                    cap.vx = Math.cos(angle) * hitSpeed * 0.85; cap.vy = Math.sin(angle) * hitSpeed * 0.85;
                }
            });
        }

        // --- DOKUNMATİK VE FARE ETKİLEŞİMLERİ ---
        function getCanvasTouchPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        let dragStartPinPos = { x: 0, y: 0 };

        canvas.addEventListener('mousedown', (e) => {
            const pos = getCanvasTouchPos(e);

            if (currentPhase === 'setup') {
                // Sadece düzenlememize izin verilen takımın oyuncularını yakalayabiliriz
                for (let p of pins) {
                    if (!p.isPost && p.team === editableTeam) {
                        if (Math.hypot(pos.x - p.x, pos.y - p.y) < 22) {
                            selectedPin = p;
                            dragStartPinPos = { x: p.x, y: p.y }; // Geçersiz yerleşim durumunda geri dönmek için
                            break;
                        }
                    }
                }
            } 
            else if (currentPhase === 'playing') {
                if (gameMode === 'online' && turn !== myTeamNumber) return; 
                if (gameMode === 'ai' && turn === 2) return; 
                if (Math.hypot(cap.vx, cap.vy) > 0.2) return; 

                if (Math.hypot(pos.x - cap.x, pos.y - cap.y) < 45) {
                    isDraggingBall = true;
                    dragStart = { x: cap.x, y: cap.y };
                    dragCurrent = pos;
                }
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            const pos = getCanvasTouchPos(e);
            if (currentPhase === 'setup' && selectedPin) {
                selectedPin.x = pos.x;
                selectedPin.y = pos.y;
            } 
            else if (currentPhase === 'playing' && isDraggingBall) {
                dragCurrent = pos;
            }
        });

        window.addEventListener('mouseup', () => {
            if (currentPhase === 'setup' && selectedPin) {
                let valid = true;

                // Oyun alanında tut (kale arkası koridorları hariç)
                if (selectedPin.x < 15 || selectedPin.x > width - 15 || selectedPin.y < goalHeight + 15 || selectedPin.y > height - goalHeight - 15) {
                    valid = false;
                }

                // Mesafe Sınırı Kontrolü: AYNI takımdaki diğer oyuncularla ve kale direkleriyle olan mesafe
                if (valid) {
                    for (let p of pins) {
                        if (p !== selectedPin) {
                            if (p.isPost) {
                                // Sabit kale direklerine güvenli mesafe
                                if (Math.hypot(selectedPin.x - p.x, selectedPin.y - p.y) < minAllowedDistance) {
                                    valid = false;
                                    break;
                                }
                            } else if (p.team === selectedPin.team) {
                                // Aynı takım oyuncusuyla 2.5 top boyu kontrolü
                                if (Math.hypot(selectedPin.x - p.x, selectedPin.y - p.y) < minAllowedDistance) {
                                    valid = false;
                                    break;
                                }
                            }
                        }
                    }
                }

                if (!valid) { 
                    // Sınır aşılırsa oyuncuyu sürüklemeye başladığı eski konumuna fırlat
                    selectedPin.x = dragStartPinPos.x; 
                    selectedPin.y = dragStartPinPos.y; 
                }

                selectedPin = null;
            } 
            
            if (currentPhase === 'playing' && isDraggingBall) {
                isDraggingBall = false;
                cap.vx = (dragStart.x - dragCurrent.x) * 0.13;
                cap.vy = (dragStart.y - dragCurrent.y) * 0.13;
                
                turn = turn === 1 ? 2 : 1;
                updateHUDTurn();
                broadcastState();
                resetShotTimer(); 
            }
        });

        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); canvas.dispatchEvent(new MouseEvent('mousedown', { clientX: e.touches[0].clientX, clientY: e.touches[0].clientY })); }, {passive:false});
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); canvas.dispatchEvent(new MouseEvent('mousemove', { clientX: e.touches[0].clientX, clientY: e.touches[0].clientY })); }, {passive:false});
        window.addEventListener('touchend', () => window.dispatchEvent(new MouseEvent('mouseup')));

        function exitToMenu() {
            if(timerInterval) clearInterval(timerInterval);
            if(shotTimerInterval) clearInterval(shotTimerInterval);
            socket.emit("leave-lobby");
            currentPhase = 'menu';
            document.getElementById('menu').style.display = 'block';
            document.getElementById('top-bar').style.display = 'none';
            document.getElementById('online-lobby').style.display = 'none';
            drawFieldLinesOnly(); 
        }

        // --- RETRO OYUNCU ÇİZİMİ ---
        function drawRetroPlayer(x, y, team) {
            ctx.save(); ctx.translate(x, y);
            if (team === 2) ctx.rotate(Math.PI);
            
            const bodyColor = (team === 1) ? '#3498db' : '#cc0000';
            const skinColor = '#ffad87';

            ctx.fillStyle = bodyColor;
            ctx.fillRect(-14, -4, 5, 4); ctx.fillRect(9, -4, 5, 4);
            ctx.fillStyle = skinColor;
            ctx.fillRect(-14, -8, 4, 4); ctx.fillRect(10, -8, 4, 4);
            ctx.fillStyle = bodyColor;
            ctx.fillRect(-9, -2, 18, 7); ctx.fillRect(-6, 5, 12, 4);
            ctx.fillStyle = skinColor; ctx.fillRect(-3, -5, 6, 4);
            ctx.fillStyle = '#111111'; ctx.fillRect(-4, 4, 8, 7);
            ctx.restore();
        }

        // --- RETRO TOP ÇİZİMİ (MERKEZİ DINAMİK RENKLİ) ---
        function drawSoccerBall(x, y, r, rotation) {
            ctx.save(); ctx.translate(x, y); ctx.rotate(rotation);
            ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
            ctx.lineWidth = 1.5; ctx.strokeStyle = '#000'; ctx.stroke();
            
            // Oyun sırasındaki takımın rengi topun merkezindeki panele işlenir
            ctx.fillStyle = (turn === 1) ? '#3498db' : '#cc0000'; 
            
            ctx.beginPath();
            for (let i = 0; i < 5; i++) {
                let a = (Math.PI * 2 / 5) * i - Math.PI / 2;
                ctx.lineTo(Math.cos(a) * (r * 0.4), Math.sin(a) * (r * 0.4));
            }
            ctx.closePath(); ctx.fill(); ctx.stroke(); ctx.restore();
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            
            // Saha Çizgileri
            ctx.strokeStyle = "rgba(255,255,255,0.35)"; ctx.lineWidth = 2.5;
            ctx.beginPath(); ctx.moveTo(0, height/2); ctx.lineTo(width, height/2); ctx.stroke();
            ctx.beginPath(); ctx.arc(width/2, height/2, 45, 0, Math.PI*2); ctx.stroke();
            ctx.strokeRect(pBoxX1, 0, penaltyBoxW, penaltyBoxH);
            ctx.strokeRect(pBoxX1, height - penaltyBoxH, penaltyBoxW, penaltyBoxH);

            if (currentPhase === 'setup') {
                // TAM SAHA YERLEŞİM ALANI PARLAMASI
                ctx.fillStyle = "rgba(46, 204, 113, 0.12)";
                ctx.fillRect(10, goalHeight + 10, width - 20, height - (goalHeight * 2) - 20);
                ctx.strokeStyle = "rgba(46, 204, 113, 0.35)";
                ctx.lineWidth = 2;
                ctx.strokeRect(10, goalHeight + 10, width - 20, height - (goalHeight * 2) - 20);
            }

            pins.forEach(pin => {
                if(pin.isPost) {
                    ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(pin.x, pin.y, 4, 0, Math.PI * 2); ctx.fill();
                } else {
                    let renderTeam = pin.team;
                    if(gameMode === 'online' && myTeamNumber === 2) {
                        renderTeam = pin.team === 1 ? 2 : 1;
                    }
                    drawRetroPlayer(pin.x, pin.y, renderTeam);
                }
            });

            if (currentPhase === 'playing' && isDraggingBall) {
                ctx.strokeStyle = '#2ecc71'; ctx.lineWidth = 4;
                ctx.beginPath(); ctx.moveTo(cap.x, cap.y);
                ctx.lineTo(cap.x + (dragStart.x - dragCurrent.x), cap.y + (dragStart.y - dragCurrent.y));
                ctx.stroke();
            }

            if (currentPhase === 'playing') {
                drawSoccerBall(cap.x, cap.y, cap.radius, cap.rotation);
            }
        }

        function animate() {
            if (currentPhase === 'menu') return;
            updatePhysics();
            draw();
            requestAnimationFrame(animate);
        }
    </script>
</body>
