<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Çivili Futbol</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js" defer></script>
    <script src="game.js" defer></script>
</head>
<body>

    <!-- ===== ANA MENÜ ===== -->
<div id="menu">
    <!-- TAKIM LOGOSU GÖSTERİM ALANI -->
    <div id="team-logo-display">
        <img id="selected-team-logo" src="takimlar/default.png" alt="Takım Logosu">
    </div>
    
    <h1>⚽ ÇİVİLİ FUTBOL</h1>
    
    <div class="input-group">
        <label>👤 OYUNCU İSMİ</label>
        <input type="text" id="player-name" value="Oyuncu" maxlength="12">
    </div>

    <!-- TAKIM SEÇ BUTONU -->
    <div class="input-group">
        <button class="team-select-btn" onclick="toggleTeamSelect()">
            <span class="team-select-icon">🏆</span>
            <span id="team-select-text">Takım Seç</span>
            <span id="selected-team-name-display">Varsayılan</span>
            <span class="team-select-arrow">▼</span>
        </button>
    </div>

    <!-- TAKIM LOGO SEÇİM ALANI (BAŞLANGIÇTA GİZLİ) -->
    <div class="team-logo-container" id="team-logo-container" style="display: none;">
        <div class="team-logo-options" id="team-logo-options">
            <!-- Logolar JavaScript ile eklenecek -->
        </div>
    </div>

    <div class="mode-container">
        <button class="main-btn btn-ai" onclick="openAILevelMenu()">🤖 Bilgisayara Karşı</button>
        <button class="main-btn btn-local" onclick="startLocalGame('local')">👥 2 Kişilik Aynı Ekran</button>
        <button class="main-btn btn-online" onclick="openOnlineLobby()">🌐 Online Maç</button>
    </div>

    <button class="settings-toggle" onclick="openSettingsPopup()">⚙️ Ayarlar</button>
</div>
    <!-- ===== AYARLAR POP-UP ===== -->
    <div id="settings-popup" style="display: none;" onclick="if(event.target===this) closeSettingsPopup()">
        <div class="popup-content">
            <div class="popup-header">
                <h2>⚙️ AYARLAR</h2>
                <button class="popup-close" onclick="closeSettingsPopup()">✕</button>
            </div>
            <div class="popup-body">
                <div class="input-group">
                    <label>⏱️ MAÇ SÜRESİ</label>
                    <select id="match-duration">
                        <option value="60">1 Dakika</option>
                        <option value="90" selected>1.5 Dakika</option>
                        <option value="120">2 Dakika</option>
                        <option value="180">3 Dakika</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>🔵 FORMA RENGİ (Mavi Takım)</label>
                    <div class="color-options">
                        <button class="color-btn active" data-team="1" data-color="#3498db" style="background:#3498db" onclick="selectColor(1, '#3498db')">🔵</button>
                        <button class="color-btn" data-team="1" data-color="#e74c3c" style="background:#e74c3c" onclick="selectColor(1, '#e74c3c')">🔴</button>
                        <button class="color-btn" data-team="1" data-color="#2ecc71" style="background:#2ecc71" onclick="selectColor(1, '#2ecc71')">🟢</button>
                        <button class="color-btn" data-team="1" data-color="#f1c40f" style="background:#f1c40f" onclick="selectColor(1, '#f1c40f')">🟡</button>
                        <button class="color-btn" data-team="1" data-color="#9b59b6" style="background:#9b59b6" onclick="selectColor(1, '#9b59b6')">🟣</button>
                        <button class="color-btn" data-team="1" data-color="#e67e22" style="background:#e67e22" onclick="selectColor(1, '#e67e22')">🟠</button>
                    </div>
                </div>
                <div class="input-group">
                    <label>🔴 FORMA RENGİ (Kırmızı Takım)</label>
                    <div class="color-options">
                        <button class="color-btn active" data-team="2" data-color="#e74c3c" style="background:#e74c3c" onclick="selectColor(2, '#e74c3c')">🔴</button>
                        <button class="color-btn" data-team="2" data-color="#3498db" style="background:#3498db" onclick="selectColor(2, '#3498db')">🔵</button>
                        <button class="color-btn" data-team="2" data-color="#2ecc71" style="background:#2ecc71" onclick="selectColor(2, '#2ecc71')">🟢</button>
                        <button class="color-btn" data-team="2" data-color="#f1c40f" style="background:#f1c40f" onclick="selectColor(2, '#f1c40f')">🟡</button>
                        <button class="color-btn" data-team="2" data-color="#9b59b6" style="background:#9b59b6" onclick="selectColor(2, '#9b59b6')">🟣</button>
                        <button class="color-btn" data-team="2" data-color="#e67e22" style="background:#e67e22" onclick="selectColor(2, '#e67e22')">🟠</button>
                    </div>
                </div>
                <div class="input-group">
                    <label>🟩 SAHA RENGİ</label>
                    <div class="color-options">
                        <button class="color-btn active" data-field="#2e7d32" style="background:#2e7d32" onclick="selectFieldColor('#2e7d32')">🟩</button>
                        <button class="color-btn" data-field="#1a5276" style="background:#1a5276" onclick="selectFieldColor('#1a5276')">🟦</button>
                        <button class="color-btn" data-field="#7d6608" style="background:#7d6608" onclick="selectFieldColor('#7d6608')">🟨</button>
                        <button class="color-btn" data-field="#6c3483" style="background:#6c3483" onclick="selectFieldColor('#6c3483')">🟪</button>
                        <button class="color-btn" data-field="#1a1a1a" style="background:#1a1a1a; border-color:#555" onclick="selectFieldColor('#1a1a1a')">⬛</button>
                    </div>
                </div>
            </div>
            <div class="popup-footer">
                <button class="popup-close-btn" onclick="closeSettingsPopup()">✓ Tamam</button>
            </div>
        </div>
    </div>

    <!-- ===== AI ZORLUK POP-UP ===== -->
    <div id="ai-level-menu" style="display: none;" onclick="if(event.target===this) closeAILevelMenu()">
        <div class="popup-content">
            <div class="popup-header">
                <h2>🤖 ZORLUK SEVİYESİ</h2>
                <button class="popup-close" onclick="closeAILevelMenu()">✕</button>
            </div>
            <div class="popup-body">
                <button class="main-btn btn-ai-level" onclick="startLocalGame('ai', 'kolay')">🟢 Kolay</button>
                <button class="main-btn btn-ai-level" onclick="startLocalGame('ai', 'orta')">🟡 Orta</button>
                <button class="main-btn btn-ai-level" onclick="startLocalGame('ai', 'zor')">🟠 Zor</button>
                <button class="main-btn btn-ai-level" onclick="startLocalGame('ai', 'usta')">🔴 Usta</button>
            </div>
        </div>
    </div>

    <!-- ===== ONLINE LOBI POP-UP ===== -->
    <div id="online-lobby" style="display: none;" onclick="if(event.target===this) closeOnlineLobby()">
        <div class="popup-content">
            <div class="popup-header">
                <h2>🌐 ÇEVRİMİÇİ HAVUZ</h2>
                <button class="popup-close" onclick="closeOnlineLobby()">✕</button>
            </div>
            <div class="popup-body">
                <p style="font-size: 11px; color: #ccc; margin-bottom: 10px;">Maç yapmak istediğiniz kişiye tıklayarak davet gönderin</p>
                <div class="player-list" id="lobby-list">
                    <div style="padding:15px;color:#888;text-align:center;">Havuz güncelleniyor...</div>
                </div>
            </div>
        </div>
    </div>

<!-- ===== OYUN EKRANI ===== -->
<div id="top-bar" style="display: none;">
    <div class="hud-row">
        <button id="exit-btn" onclick="exitToMenu()">✕</button>
        <div id="score-board">
            <div class="team-score">
                <img id="score-logo-p1" src="takimlar/default.png" alt="Takım 1" class="score-logo">
                <span id="score-p1">0</span>
            </div>
            <span id="score-divider">-</span>
            <div class="team-score">
                <span id="score-p2">0</span>
                <img id="score-logo-p2" src="takimlar/default.png" alt="Takım 2" class="score-logo">
            </div>
        </div>
        <div id="time-board">90s</div>
    </div>
    <div class="hud-row-second">
        <div id="turn-indicator">Diziliş</div>
        <div id="shot-timer">ŞUT: 3s</div>
    </div>
</div>

</body>
</html>
