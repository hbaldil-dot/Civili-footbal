<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Çivili Futbol - Online Multiplayer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        body {
            background: #111; font-family: 'Courier New', Courier, monospace; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white;
        }
        
        /* ANA MENÜ */
        #menu {
            position: absolute; background: rgba(20, 30, 20, 0.98); border: 4px solid #4a754a;
            border-radius: 12px; padding: 25px; text-align: center; z-index: 100; width: 90%; max-width: 360px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); display: block;
        }
        h1 { color: #2ecc71; margin-bottom: 20px; font-size: 24px; text-shadow: 2px 2px black; font-weight: bold; }
        .input-group { margin-bottom: 14px; text-align: left; }
        .input-group label { font-size: 11px; color: #2ecc71; font-weight: bold; display: block; margin-bottom: 4px; letter-spacing: 1px; }
        input, select {
            width: 100%; padding: 10px; border-radius: 4px; border: 2px solid #4a754a; background: #1a1a1a; color: white; font-size: 14px; font-family: inherit;
        }
        .mode-container { margin-top: 15px; display: flex; flex-direction: column; gap: 8px; }
        .main-btn {
            display: block; width: 100%; padding: 12px; background: #2e7d32; color: white; border: none;
            border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; font-family: inherit; box-shadow: 0 4px #1b5e20;
            text-align: center;
        }
        .main-btn:active { transform: translateY(2px); box-shadow: 0 2px #1b5e20; }
        .btn-online { background: #8e44ad; box-shadow: 0 4px #6c3483; }

        /* GERÇEK LOBİ (HAVUZ) PANELİ */
        #online-lobby {
            position: absolute; background: rgba(20, 20, 30, 0.98); border: 4px solid #6c3483;
            border-radius: 12px; padding: 20px; text-align: center; z-index: 110; width: 90%; max-width: 360px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.9); display: none;
        }
        #online-lobby h2 { color: #9b59b6; margin-bottom: 15px; font-size: 20px; text-shadow: 1px 1px black; }
        .player-list {
            background: #111; border: 2px solid #444; border-radius: 6px; 
            max-height: 180px; overflow-y: auto; margin-bottom: 15px; text-align: left;
        }
        .player-item {
            padding: 10px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; transition: background 0.2s;
        }
        .player-item:hover { background: #2c1d3a; }
        .player-item .status { font-size: 11px; padding: 4px 8px; border-radius: 3px; font-weight: bold; background: #27ae60; color: white; }
        .lobby-close-btn {
            width: 100%; padding: 10px; background: #c0392b; color: white; border: none; border-radius: 6px;
            font-weight: bold; cursor: pointer; font-family: inherit;
        }

        /* OYUN ÜST HUD BARI */
        #top-bar {
            position: absolute; top: 10px; width: 95%; max-width: 380px;
            display: flex; flex-direction: column; gap: 5px; align-items: center; z-index: 15; pointer-events: none; display: none;
        }
        .hud-row { display: flex; width: 100%; justify-content: space-between; align-items: center; }
        #score-board, #turn-indicator {
            background: rgba(0, 0, 0, 0.85); padding: 6px 12px; border-radius: 4px;
            font-size: 16px; font-weight: bold; border: 2px solid #fff; text-align: center;
        }
        #turn-indicator { color: #f1c40f; border-color: #f1c40f; }
        
        #exit-btn, #start-match-btn {
            color: white; border: 2px solid #fff; border-radius: 4px;
            font-size: 13px; font-weight: bold; cursor: pointer; pointer-events: auto;
            padding: 6px 12px; font-family: inherit;
        }
        #exit-btn { background: #c0392b; }
        #start-match-btn { background: #27ae60; display: none; }

        canvas { background: #2e7d32; border: 10px solid #1b5e20; border-radius: 8px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
    </style>
    <!-- Soket Kütüphanesi -->
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <!-- MENÜ -->
    <div id="menu">
        <h1>ÇİVİLİ FUTBOL</h1>
        <div class="input-group">
            <label>OYUNCU İSMİ</label>
            <input type="text" id="player-name" value="Oyuncu" maxlength="12">
        </div>
        <div class="mode-container">
            <button class="main-btn btn-online" onclick="openOnlineLobby()">🌐 Çevrimiçi Havuza Gir</button>
        </div>
    </div>

    <!-- ONLINE OYUNCU HAVUZU (LOBİ) -->
    <div id="online-lobby">
        <h2>ÇEVRİMİÇİ HAVUZ</h2>
        <p style="font-size: 11px; color: #ccc; margin-bottom: 10px;">Maç yapmak istediğiniz kişiye tıklayarak davet gönderin</p>
        <div class="player-list" id="lobby-list">
            <div style="padding:15px;color:#888;text-align:center;">Havuz güncelleniyor...</div>
        </div>
        <button class="lobby-close-btn" onclick="closeOnlineLobby()">Geri Dön</button>
    </div>

    <!-- ÜST BAR HUD -->
    <div id="top-bar">
        <div class="hud-row">
            <button id="exit-btn" onclick="exitToMenu()">ÇIKIŞ</button>
            <div id="turn-indicator">Diziliş Yapılıyor</div>
            <div id="score-board">0 - 0</div>
            <button id="start-match-btn" onclick="confirmFormationsAndStart()">BAŞLAT</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        // Bulunduğumuz sunucuya dinamik bağlanıyoruz
        const socket = io();

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const width = 360;
        const height = 620;
        canvas.width = width; canvas.height = height;

        let currentPhase = 'menu'; // menu, setup, playing
        let score = { p1: 0, p2: 0 };
        let turn = 1; // 1: Ev Sahibi, 2: Deplasman
        let myTeamNumber = 1; 
        let currentRoomId = null;

        let cap = { x: width/2, y: height/2, vx: 0, vy: 0, radius: 11, friction: 0.983, rotation: 0 };
        let pins = []; 
        let benchPins = []; 
        let selectedPin = null; 
        let isDraggingBall = false;
        let dragStart = { x: 0, y: 0 }, dragCurrent = { x: 0, y: 0 };

        const goalWidth = cap.radius * 2 * 3.2, goalHeight = 12;
        const penaltyBoxW = goalWidth * 2.2, penaltyBoxH = height * 0.15;
        const pBoxX1 = (width - penaltyBoxW) / 2, pBoxX2 = pBoxX1 + penaltyBoxW;
        const p1BoxY1 = height - penaltyBoxH;
        const benchY = 45;

        drawFieldLinesOnly();

        function drawFieldLinesOnly() {
            ctx.clearRect(0, 0, width, height);
            ctx.strokeStyle = "rgba(255,255,255,0.35)"; ctx.lineWidth = 2.5;
            ctx.beginPath(); ctx.moveTo(0, height/2); ctx.lineTo(width, height/2); ctx.stroke();
            ctx.beginPath(); ctx.arc(width/2, height/2, 45, 0, Math.PI*2); ctx.stroke();
            ctx.strokeRect(pBoxX1, 0, penaltyBoxW, penaltyBoxH);
            ctx.strokeRect(pBoxX1, height - penaltyBoxH, penaltyBoxW, penaltyBoxH);
        }

        // --- ONLINE LOBİ SOKET ALTYAPISI ---
        function openOnlineLobby() {
            const name = document.getElementById('player-name').value.trim() || "Oyuncu_" + Math.floor(Math.random()*100);
            socket.emit("join-lobby", name);
            document.getElementById('menu').style.display = 'none';
            document.getElementById('online-lobby').style.display = 'block';
        }

        function closeOnlineLobby() {
            socket.emit("leave-lobby");
            document.getElementById('online-lobby').style.display = 'none';
            document.getElementById('menu').style.display = 'block';
        }

        // Havuzdaki oyuncu listesini güncelle
        socket.on("update-lobby-players", (players) => {
            const listContainer = document.getElementById('lobby-list');
            listContainer.innerHTML = "";
            let count = 0;

            players.forEach(p => {
                if (p.id !== socket.id) {
                    count++;
                    const item = document.createElement('div');
                    item.className = 'player-item';
                    item.innerHTML = `<span>⚽ ${p.name}</span><span class="status">Davet Et</span>`;
                    item.onclick = () => {
                        alert(`${p.name} kullanıcısına davet gönderildi. Yanıt bekleniyor...`);
                        socket.emit("send-invite", p.id);
                    };
                    listContainer.appendChild(item);
                }
            });

            if (count === 0) {
                listContainer.innerHTML = "<div style='padding:15px;color:#888;text-align:center;'>Havuz boş. Diğer telefondan da girin.</div>";
            }
        });

        // Davet Alma
        socket.on("receive-invite", (data) => {
            if (confirm(`${data.fromName} seni maça davet ediyor! Kabul ediyor musun?`)) {
                socket.emit("accept-invite", data.fromId);
            }
        });

        // Maçın Kurulması (Diziliş Aşaması Başlıyor)
        socket.on("start-online-match", ({ roomId, team }) => {
            currentRoomId = roomId;
            myTeamNumber = team; 
            document.getElementById('online-lobby').style.display = 'none';
            document.getElementById('top-bar').style.display = 'flex';
            
            startSetupPhase();
        });

        // Rakip Oyuncu Çıkarsa
        socket.on("opponent-disconnected", () => {
            alert("Rakip oyundan ayrıldı.");
            exitToMenu();
        });

        // Maçın Resmen Başlaması (Kadrolar yerleştikten sonra sunucudan gelen tetikleyici)
        socket.on("match-go", ({ pins: finalPins }) => {
            pins = finalPins;
            benchPins = [];
            currentPhase = 'playing';
            document.getElementById('start-match-btn').style.display = 'none';
            updateHUDTurn();
            animate();
        });

        // Rakibin vuruşunu senkronize etme
        socket.on("peerState", (state) => {
            cap.x = state.cap.x; cap.y = state.cap.y;
            cap.vx = state.cap.vx; cap.vy = state.cap.vy;
            cap.rotation = state.cap.rotation;
            turn = state.turn;
            score = state.score;
            document.getElementById('score-board').innerText = `${score.p1} - ${score.p2}`;
            updateHUDTurn();
        });

        function broadcastState() {
            if(currentPhase !== 'playing') return;
            socket.emit('updateState', {
                roomId: currentRoomId,
                state: { 
                    cap: { x: cap.x, y: cap.y, vx: cap.vx, vy: cap.vy, rotation: cap.rotation }, 
                    turn: turn, 
                    score: score 
                }
            });
        }

        // --- TAKTİK DİZİLİŞ (SETUP) AŞAMASI ---
        function startSetupPhase() {
            currentPhase = 'setup';
            score = { p1: 0, p2: 0 };
            document.getElementById('score-board').innerText = "0 - 0";
            document.getElementById('start-match-btn').style.display = 'block';
            document.getElementById('start-match-btn').style.opacity = '0.5';
            document.getElementById('turn-indicator').innerText = "Kadro Kuruluyor";

            // Kale direkleri
            pins = [
                {x: (width - goalWidth)/2, y: goalHeight, isPost: true}, {x: (width + goalWidth)/2, y: goalHeight, isPost: true},
                {x: (width - goalWidth)/2, y: height - goalHeight, isPost: true}, {x: (width + goalWidth)/2, y: height - goalHeight, isPost: true}
            ];

            // Oyuncu yedek kulübesi (Yukarıda 11 oyuncu sırayla bekler)
            benchPins = [];
            for(let i=0; i<11; i++) {
                benchPins.push({
                    id: i, 
                    x: 20 + i * ((width - 40) / 10), y: benchY,
                    homeX: 20 + i * ((width - 40) / 10), homeY: benchY,
                    team: 1, onField: false
                });
            }

            cap.x = width/2; cap.y = height/2; cap.vx = 0; cap.vy = 0;
            animate();
        }

        function checkFormationsReady() {
            const allPlaced = benchPins.every(p => p.onField);
            document.getElementById('start-match-btn').style.opacity = allPlaced ? '1' : '0.5';
        }

        function confirmFormationsAndStart() {
            if (!benchPins.every(p => p.onField)) {
                alert("Lütfen üstteki tüm çivilerinizi (oyuncularınızı) sahaya yerleştirin!");
                return;
            }
            
            // Hazır bilgisini ve kendi yerleştirdiğimiz kadromuzu sunucuya gönderiyoruz
            const placedPins = benchPins.map(p => ({ x: p.x, y: p.y }));
            document.getElementById('start-match-btn').innerText = "Rakip Bekleniyor...";
            document.getElementById('start-match-btn').disabled = true;

            socket.emit("player-ready", { roomId: currentRoomId, team: myTeamNumber, placedPins });
        }

        function updateHUDTurn() {
            const indicator = document.getElementById('turn-indicator');
            if (turn === myTeamNumber) {
                indicator.innerText = "SIRA SİZDE";
                indicator.style.borderColor = "#2ecc71";
                indicator.style.color = "#2ecc71";
            } else {
                indicator.innerText = "RAKİBİN SIRASI";
                indicator.style.borderColor = "#e74c3c";
                indicator.style.color = "#e74c3c";
            }
        }

        // --- FİZİK VE GÜNCELLEME DÖNGÜLERİ ---
        function updatePhysics() {
            if(currentPhase !== 'playing') return;
            
            cap.x += cap.vx; cap.y += cap.vy;
            cap.vx *= cap.friction; cap.vy *= cap.friction;

            const isMoving = Math.hypot(cap.vx, cap.vy) > 0.15;
            if (isMoving) {
                cap.rotation += (Math.sign(cap.vx) * Math.abs(cap.vx) + Math.sign(cap.vy) * Math.abs(cap.vy)) * 0.05;
                // Vuruşun fiziğini anlık olarak karşıya senkronize et
                if(turn !== myTeamNumber) broadcastState();
            }

            // Çarpışmalar
            if (cap.x - cap.radius < 0) { cap.x = cap.radius; cap.vx *= -0.85; }
            if (cap.x + cap.radius > width) { cap.x = width - cap.radius; cap.vx *= -0.85; }
            
            if (cap.y - cap.radius <= goalHeight || cap.y + cap.radius >= height - goalHeight) {
                if (cap.x > (width - goalWidth)/2 && cap.x < (width + goalWidth)/2) {
                    // Gol Atıldı
                    if (myTeamNumber === 1) { // Çakışmayı önlemek için gol hesabını 1. oyuncu tescil eder
                        if (cap.y < height / 2) score.p2++; else score.p1++;
                        document.getElementById('score-board').innerText = `${score.p1} - ${score.p2}`;
                        cap.x = width/2; cap.y = height/2; cap.vx = 0; cap.vy = 0;
                        broadcastState();
                    }
                    return;
                } else {
                    if (cap.y - cap.radius < 0) { cap.y = cap.radius; cap.vy *= -0.85; }
                    if (cap.y + cap.radius > height) { cap.y = height - cap.radius; cap.vy *= -0.85; }
                }
            }

            pins.forEach(pin => {
                const dist = Math.hypot(cap.x - pin.x, cap.y - pin.y);
                const pinRadius = pin.isPost ? 4 : 8;
                const minDist = cap.radius + pinRadius;
                if (dist < minDist) {
                    const angle = Math.atan2(cap.y - pin.y, cap.x - pin.x);
                    cap.x = pin.x + Math.cos(angle) * minDist; cap.y = pin.y + Math.sin(angle) * minDist;
                    const hitSpeed = Math.hypot(cap.vx, cap.vy);
                    cap.vx = Math.cos(angle) * hitSpeed * 0.85; cap.vy = Math.sin(angle) * hitSpeed * 0.85;
                }
            });
        }

        // --- SÜRÜKLE BIRAK ETKİLEŞİMLERİ ---
        function getCanvasTouchPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        canvas.addEventListener('mousedown', (e) => {
            const pos = getCanvasTouchPos(e);

            if (currentPhase === 'setup') {
                // Kadro yerleşiminde üst kısımdaki yedek taşları sürüklüyoruz
                for (let p of benchPins) {
                    if (Math.hypot(pos.x - p.x, pos.y - p.y) < 20) {
                        selectedPin = p;
                        break;
                    }
                }
            } 
            else if (currentPhase === 'playing') {
                if (turn !== myTeamNumber) return; // Sıra sende değilse vuramazsın
                if (Math.hypot(cap.vx, cap.vy) > 0.2) return; // Top hareketliyken vuramazsın

                if (Math.hypot(pos.x - cap.x, pos.y - cap.y) < 45) {
                    isDraggingBall = true;
                    dragStart = { x: cap.x, y: cap.y };
                    dragCurrent = pos;
                }
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            const pos = getCanvasTouchPos(e);
            if (currentPhase === 'setup' && selectedPin) {
                selectedPin.x = pos.x;
                selectedPin.y = pos.y;
            } 
            else if (currentPhase === 'playing' && isDraggingBall) {
                dragCurrent = pos;
            }
        });

        window.addEventListener('mouseup', () => {
            if (currentPhase === 'setup' && selectedPin) {
                let valid = true;
                // Oyuncu sadece kendi sahasının (alt yarı alanın) içine taş yerleştirebilir (y > height / 2)
                if (selectedPin.x < 10 || selectedPin.x > width - 10 || selectedPin.y < height / 2 + 10 || selectedPin.y > height - 10) {
                    valid = false;
                }

                if (valid) {
                    for (let p of benchPins) {
                        if (p.id !== selectedPin.id && p.onField) {
                            if (Math.hypot(selectedPin.x - p.x, selectedPin.y - p.y) < minAllowedDistance) { valid = false; break; }
                        }
                    }
                }

                if (valid) { 
                    selectedPin.onField = true; 
                } else { 
                    selectedPin.x = selectedPin.homeX; selectedPin.y = selectedPin.homeY; selectedPin.onField = false; 
                }

                selectedPin = null;
                checkFormationsReady();
            } 
            
            if (currentPhase === 'playing' && isDraggingBall) {
                isDraggingBall = false;
                cap.vx = (dragStart.x - dragCurrent.x) * 0.13;
                cap.vy = (dragStart.y - dragCurrent.y) * 0.13;
                
                // Sırayı karşıya geçirmek
                turn = turn === 1 ? 2 : 1;
                updateHUDTurn();
                broadcastState();
            }
        });

        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); canvas.dispatchEvent(new MouseEvent('mousedown', { clientX: e.touches[0].clientX, clientY: e.touches[0].clientY })); }, {passive:false});
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); canvas.dispatchEvent(new MouseEvent('mousemove', { clientX: e.touches[0].clientX, clientY: e.touches[0].clientY })); }, {passive:false});
        window.addEventListener('touchend', () => window.dispatchEvent(new MouseEvent('mouseup')));

        function exitToMenu() {
            socket.emit("leave-lobby");
            currentPhase = 'menu';
            document.getElementById('menu').style.display = 'block';
            document.getElementById('top-bar').style.display = 'none';
            document.getElementById('online-lobby').style.display = 'none';
            document.getElementById('start-match-btn').innerText = "BAŞLAT";
            document.getElementById('start-match-btn').disabled = false;
            drawFieldLinesOnly(); 
        }

        // --- ÇİZİM İŞLEMLERİ ---
        function drawRetroPlayer(x, y, team) {
            ctx.save(); ctx.translate(x, y);
            // Karşı takımın oyuncularını ters yöne çeviriyoruz
            if (team === 2) ctx.rotate(Math.PI);
            
            const bodyColor = (team === 1) ? '#0044ff' : '#cc0000';
            const skinColor = '#ffad87';

            ctx.fillStyle = bodyColor;
            ctx.fillRect(-14, -4, 5, 4); ctx.fillRect(9, -4, 5, 4);
            ctx.fillStyle = skinColor;
            ctx.fillRect(-14, -8, 4, 4); ctx.fillRect(10, -8, 4, 4);
            ctx.fillStyle = bodyColor;
            ctx.fillRect(-9, -2, 18, 7); ctx.fillRect(-6, 5, 12, 4);
            ctx.fillStyle = skinColor; ctx.fillRect(-3, -5, 6, 4);
            ctx.fillStyle = '#111111'; ctx.fillRect(-4, 4, 8, 7);
            ctx.restore();
        }

        function drawSoccerBall(x, y, r, rotation) {
            ctx.save(); ctx.translate(x, y); ctx.rotate(rotation);
            ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
            ctx.lineWidth = 1.5; ctx.strokeStyle = '#000'; ctx.stroke();
            ctx.fillStyle = '#111'; ctx.beginPath();
            for (let i = 0; i < 5; i++) {
                let a = (Math.PI * 2 / 5) * i - Math.PI / 2;
                ctx.lineTo(Math.cos(a) * (r * 0.4), Math.sin(a) * (r * 0.4));
            }
            ctx.closePath(); ctx.fill(); ctx.stroke(); ctx.restore();
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            
            // Saha Çizgileri
            ctx.strokeStyle = "rgba(255,255,255,0.35)"; ctx.lineWidth = 2.5;
            ctx.beginPath(); ctx.moveTo(0, height/2); ctx.lineTo(width, height/2); ctx.stroke();
            ctx.beginPath(); ctx.arc(width/2, height/2, 45, 0, Math.PI*2); ctx.stroke();
            ctx.strokeRect(pBoxX1, 0, penaltyBoxW, penaltyBoxH);
            ctx.strokeRect(pBoxX1, height - penaltyBoxH, penaltyBoxW, penaltyBoxH);

            if (currentPhase === 'setup') {
                // Yedek Çivi barı
                ctx.fillStyle = "rgba(0,0,0,0.5)";
                ctx.fillRect(0, 0, width, 70);
                ctx.strokeStyle = "#f1c40f"; ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.moveTo(0, 70); ctx.lineTo(width, 70); ctx.stroke();
            }

            pins.forEach(pin => {
                if(pin.isPost) {
                    ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(pin.x, pin.y, 4, 0, Math.PI * 2); ctx.fill();
                } else {
                    // Takım numaraları oyuncuların rolleriyle eşleştirilerek render edilir
                    let renderTeam = pin.team;
                    if(myTeamNumber === 2) {
                        // Kendi ekranında deplasman olan oyuncunun renkleri ve sahası düzgün gözüksün diye takımları yer değiştiriyoruz
                        renderTeam = pin.team === 1 ? 2 : 1;
                    }
                    drawRetroPlayer(pin.x, pin.y, renderTeam);
                }
            });

            if (currentPhase === 'setup') {
                benchPins.forEach(p => { drawRetroPlayer(p.x, p.y, p.team); });
            }

            if (currentPhase === 'playing' && isDraggingBall) {
                ctx.strokeStyle = '#2ecc71'; ctx.lineWidth = 4;
                ctx.beginPath(); ctx.moveTo(cap.x, cap.y);
                ctx.lineTo(cap.x + (dragStart.x - dragCurrent.x), cap.y + (dragStart.y - dragCurrent.y));
                ctx.stroke();
            }

            if (currentPhase === 'playing') {
                drawSoccerBall(cap.x, cap.y, cap.radius, cap.rotation);
            }
        }

        function animate() {
            if (currentPhase === 'menu') return;
            updatePhysics();
            draw();
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
