<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Çivili Futbol - Klasik & Online</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        input, select, textarea { user-select: text !important; -webkit-user-select: text !important; }
        body {
            background: #111; font-family: 'Courier New', Courier, monospace; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100dvh; width: 100vw; color: white; padding: 8px;
            position: relative;
        }
        #menu {
            position: absolute; background: rgba(20, 30, 20, 0.98); border: 4px solid #4a754a;
            border-radius: 12px; padding: 25px; text-align: center; z-index: 100; width: 90%; max-width: 360px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); display: block;
        }
        h1 { color: #2ecc71; margin-bottom: 15px; font-size: 24px; text-shadow: 2px 2px black; font-weight: bold; }
        .input-group { margin-bottom: 14px; text-align: left; }
        .input-group label { font-size: 11px; color: #2ecc71; font-weight: bold; display: block; margin-bottom: 4px; letter-spacing: 1px; }
        input, select {
            width: 100%; padding: 10px; border-radius: 4px; border: 2px solid #4a754a; background: #1a1a1a; color: white; font-size: 14px; font-family: inherit;
        }
        .mode-container { margin-top: 15px; display: flex; flex-direction: column; gap: 8px; }
        .main-btn {
            display: block; width: 100%; padding: 12px; background: #2e7d32; color: white; border: none;
            border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; font-family: inherit; box-shadow: 0 4px #1b5e20;
            text-align: center;
        }
        .main-btn:active { transform: translateY(2px); box-shadow: 0 2px #1b5e20; }
        .btn-local { background: #3498db; box-shadow: 0 4px #2980b9; }
        .btn-ai { background: #e67e22; box-shadow: 0 4px #d35400; }
        .btn-online { background: #8e44ad; box-shadow: 0 4px #6c3483; }

        #online-lobby {
            position: absolute; background: rgba(20, 20, 30, 0.98); border: 4px solid #6c3483;
            border-radius: 12px; padding: 20px; text-align: center; z-index: 110; width: 90%; max-width: 360px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.9); display: none;
        }
        #online-lobby h2 { color: #9b59b6; margin-bottom: 15px; font-size: 20px; text-shadow: 1px 1px black; }
        .player-list {
            background: #111; border: 2px solid #444; border-radius: 6px; 
            max-height: 180px; overflow-y: auto; margin-bottom: 15px; text-align: left;
        }
        .player-item {
            padding: 10px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center;
        }
        .player-item .status { 
            font-size: 11px; padding: 6px 10px; border-radius: 4px; font-weight: bold; 
            background: #27ae60; color: white; cursor: pointer; border: none; font-family: inherit;
        }
        .player-item .status:active { background: #1e8449; }
        .lobby-close-btn {
            width: 100%; padding: 10px; background: #c0392b; color: white; border: none; border-radius: 6px;
            font-weight: bold; cursor: pointer; font-family: inherit;
        }

        #top-bar {
            width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 5px; align-items: center; z-index: 15; pointer-events: none; display: none; margin-bottom: 6px;
        }
        .hud-row { display: flex; width: 100%; justify-content: space-between; align-items: center; gap: 4px; }
        
        #score-board {
            background: rgba(0, 0, 0, 0.85); padding: 5px 8px; border-radius: 4px;
            font-size: 14px; font-weight: bold; border: 2px solid #fff; text-align: center;
            display: flex; gap: 6px; justify-content: center; align-items: center;
        }
        #score-p1 { color: #3498db; }
        #score-divider { color: #ffffff; }
        #score-p2 { color: #e74c3c; }

        #turn-indicator, #time-board, #shot-timer {
            background: rgba(0, 0, 0, 0.85); padding: 5px 8px; border-radius: 4px;
            font-size: 12px; font-weight: bold; border: 2px solid #fff; text-align: center;
        }
        #turn-indicator { color: #f1c40f; border-color: #f1c40f; min-width: 85px; }
        #time-board { color: #3498db; border-color: #3498db; }
        #shot-timer { color: #e74c3c; border-color: #e74c3c; min-width: 55px; display: none; }
        
        #exit-btn {
            color: white; border: 2px solid #fff; border-radius: 4px;
            font-size: 12px; font-weight: bold; cursor: pointer; pointer-events: auto;
            padding: 5px 10px; font-family: inherit; background: #c0392b;
        }

        .canvas-container {
            position: relative;
            max-height: 82dvh; max-width: 100%; aspect-ratio: 360 / 620;
        }
        canvas { 
            background: #2e7d32; border: 6px solid #1b5e20; border-radius: 8px; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            width: 100%; height: 100%; display: block;
        }

        #start-match-btn {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 84px; height: 84px;
            border-radius: 50%;
            border: 4px solid #27ae60;
            background: rgba(39, 174, 96, 0.9);
            color: white;
            font-family: inherit;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            z-index: 50;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5), inset 0 0 10px rgba(255,255,255,0.3);
            transition: all 0.2s ease;
            text-align: center;
            line-height: 1.2;
        }
        #start-match-btn:active {
            transform: translate(-50%, -50%) scale(0.95);
            background: rgba(30, 132, 73, 0.95);
        }
        #start-match-btn .timer-subtext {
            font-size: 16px;
            display: block;
            margin-top: 2px;
            color: #f1c40f;
            text-shadow: 1px 1px 2px black;
        }
    </style>
    <script src="/socket.io/socket.io.js" onerror="console.warn('Sunucu bulunamadı, online mod devre dışı.')"></script>
</head>
<body>

    <div id="menu">
        <h1>ÇİVİLİ FUTBOL</h1>
        <div class="input-group">
            <label>OYUNCU İSMİ</label>
            <input type="text" id="player-name" value="Oyuncu" maxlength="12">
        </div>
        <div class="input-group">
            <label>MAÇ SÜRESİ</label>
            <select id="match-duration">
                <option value="60">1 Dakika (60s)</option>
                <option value="90" selected>1.5 Dakika (90s)</option>
                <option value="120">2 Dakika (120s)</option>
            </select>
        </div>
        <div class="mode-container">
            <button class="main-btn btn-ai" onclick="startLocalGame('ai')">🤖 Bilgisayara Karşı</button>
            <button class="main-btn btn-local" onclick="startLocalGame('local')">👥 2 Oyuncu (Aynı Ekran)</button>
            <button class="main-btn btn-online" onclick="openOnlineLobby()">🌐 Çevrimiçi Havuzu Gir</button>
        </div>
    </div>

    <div id="online-lobby">
        <h2>ÇEVRİMİÇİ HAVUZ</h2>
        <p style="font-size: 11px; color: #ccc; margin-bottom: 10px;">Maç yapmak istediğiniz kişiye tıklayarak davet gönderin</p>
        <div class="player-list" id="lobby-list">
            <div style="padding:15px;color:#888;text-align:center;">Havuz güncelleniyor...</div>
        </div>
        <button class="lobby-close-btn" onclick="closeOnlineLobby()">Geri Dön</button>
    </div>

    <div id="top-bar">
        <div class="hud-row">
            <button id="exit-btn" onclick="exitToMenu()">ÇIKIŞ</button>
            <div id="turn-indicator">Diziliş</div>
            <div id="score-board">
                <span id="score-p1">0</span>
                <span id="score-divider">-</span>
                <span id="score-p2">0</span>
            </div>
            <div id="time-board">90s</div>
            <div id="shot-timer">ŞUT: 3s</div>
        </div>
    </div>

    <div class="canvas-container">
        <canvas id="gameCanvas"></canvas>
        <button id="start-match-btn" onclick="confirmFormationsAndStart()">BAŞLAT</button>
    </div>

   <script>
    let socket = null;
    if (typeof io !== 'undefined') {
        try {
            socket = io();
            setupSocketListeners();
        } catch (e) { console.error("Socket hatası:", e); }
    }

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const width = 360; const height = 620;
    canvas.width = width; canvas.height = height;

    let currentPhase = 'menu', gameMode = 'local', score = { p1: 0, p2: 0 }, turn = 1, myTeamNumber = 1, currentRoomId = null;
    let wasMoving = false; // Senkronizasyon için eklendi
    let cap = { x: width/2, y: height/2, vx: 0, vy: 0, radius: 11, friction: 0.983, rotation: 0 };
    let pins = [], selectedPin = null, isDraggingBall = false, dragStart = { x: 0, y: 0 }, dragCurrent = { x: 0, y: 0 };

    // ... (ses fonksiyonları, çizim fonksiyonları aynı kalacak, sadece kritik kısımları güncelliyorum) ...

    function setupSocketListeners() {
        socket.on("update-lobby-players", (players) => { /* ... aynı kalacak ... */ });
        socket.on("receive-invite", (data) => { /* ... aynı kalacak ... */ });
        socket.on("start-online-match", ({ roomId, team }) => { /* ... aynı kalacak ... */ });
        
        // YENİ: Vuruş senkronizasyonu
        socket.on("receive-shot", ({ vx, vy }) => {
            if (myTeamNumber === 2) { cap.vx = -vx; cap.vy = -vy; } 
            else { cap.vx = vx; cap.vy = vy; }
            resetShotTimer();
        });

        // YENİ: Pozisyon düzeltme (hizalama)
        socket.on("sync-position", ({ x, y }) => {
            if (myTeamNumber === 2) { cap.x = width - x; cap.y = height - y; } 
            else { cap.x = x; cap.y = y; }
        });
    }

    function updatePhysics() {
        if(currentPhase !== 'playing') return;
        const SUB_STEPS = 16;
        
        for(let step = 0; step < SUB_STEPS; step++) {
            cap.x += cap.vx / SUB_STEPS; cap.y += cap.vy / SUB_STEPS;
            // ... (çarpışma mantığı aynı kalacak) ...
        }

        cap.vx *= cap.friction; cap.vy *= cap.friction;

        const isMoving = Math.hypot(cap.vx, cap.vy) > 0.15;
        
        // YENİ: Top durduğunda hizalama gönder
        if (wasMoving && !isMoving && gameMode === 'online') {
            socket.emit('sync-position', { roomId: currentRoomId, x: cap.x, y: cap.y });
        }
        wasMoving = isMoving;
    }

    window.addEventListener('mouseup', () => {
        if (gameMode === 'ai' && turn === 2) return; 

        if (currentPhase === 'playing' && isDraggingBall) {
            isDraggingBall = false; playSound('kick');
            cap.vx = (dragStart.x - dragCurrent.x) * 0.13;
            cap.vy = (dragStart.y - dragCurrent.y) * 0.13;
            
            // YENİ: Vuruş anında sadece hızı gönder
            if (gameMode === 'online') {
                socket.emit('player-shot', { roomId: currentRoomId, vx: cap.vx, vy: cap.vy });
            }
            
            turn = turn === 1 ? 2 : 1;
            updateHUDTurn(); 
            resetShotTimer(); 
        }
        // ... (setup phase pin mantığı aynı kalacak) ...
    });

    // ... (diğer tüm yardımcı fonksiyonlar aynı kalacak) ...
    function animate() {
        if (currentPhase === 'menu') return;
        updatePhysics();
        draw();
        requestAnimationFrame(animate);
    }
</script>

</body>
</html>
