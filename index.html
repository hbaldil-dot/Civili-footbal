<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Çivili Futbol - Gerçek Online v16</title>
    <!-- Socket.io İstemci Kütüphanesi Eklendi -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        body {
            background: #111; font-family: 'Courier New', Courier, monospace; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white;
        }
        #menu {
            position: absolute; background: rgba(20, 30, 20, 0.98); border: 4px solid #4a754a;
            border-radius: 12px; padding: 25px; text-align: center; z-index: 100; width: 90%; max-width: 360px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); display: block;
        }
        h1 { color: #2ecc71; margin-bottom: 20px; font-size: 24px; text-shadow: 2px 2px black; font-weight: bold; }
        .input-group { margin-bottom: 14px; text-align: left; }
        .input-group label { font-size: 11px; color: #2ecc71; font-weight: bold; display: block; margin-bottom: 4px; letter-spacing: 1px; }
        input, select {
            width: 100%; padding: 10px; border-radius: 4px; border: 2px solid #4a754a; background: #1a1a1a; color: white; font-size: 14px; font-family: inherit;
        }
        .mode-container { margin-top: 15px; display: flex; flex-direction: column; gap: 8px; }
        .main-btn {
            display: block; width: 100%; padding: 12px; background: #2e7d32; color: white; border: none;
            border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; font-family: inherit; box-shadow: 0 4px #1b5e20;
            text-align: center;
        }
        .main-btn:active { transform: translateY(2px); box-shadow: 0 2px #1b5e20; }
        .btn-ai { background: #2e7d32; box-shadow: 0 4px #1b5e20; }
        .btn-local { background: #2980b9; box-shadow: 0 4px #1f618d; }
        .btn-online { background: #8e44ad; box-shadow: 0 4px #6c3483; }

        #online-lobby {
            position: absolute; background: rgba(20, 20, 30, 0.98); border: 4px solid #6c3483;
            border-radius: 12px; padding: 20px; text-align: center; z-index: 110; width: 90%; max-width: 360px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.9); display: none;
        }
        #online-lobby h2 { color: #9b59b6; margin-bottom: 15px; font-size: 20px; text-shadow: 1px 1px black; }
        .player-list {
            background: #111; border: 2px solid #444; border-radius: 6px; 
            max-height: 180px; overflow-y: auto; margin-bottom: 15px; text-align: left;
        }
        .player-item {
            padding: 10px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; transition: background 0.2s;
        }
        .player-item:hover { background: #2c1d3a; }
        .player-item .status { font-size: 11px; padding: 2px 6px; border-radius: 3px; font-weight: bold; background: #27ae60; color: white; }
        .lobby-close-btn {
            width: 100%; padding: 10px; background: #c0392b; color: white; border: none; border-radius: 6px;
            font-weight: bold; cursor: pointer; font-family: inherit;
        }
        
        #top-bar {
            position: absolute; top: 10px; width: 95%; max-width: 380px;
            display: flex; flex-direction: column; gap: 5px; align-items: center; z-index: 15; pointer-events: none; display: none;
        }
        .hud-row { display: flex; width: 100%; justify-content: space-between; align-items: center; }
        #match-timer, #score-board, #shot-timer-ui {
            background: rgba(0, 0, 0, 0.85); padding: 6px 12px; border-radius: 4px;
            font-size: 18px; font-weight: bold; border: 2px solid #fff; text-align: center;
        }
        #match-timer { color: #f1c40f; border-color: #f1c40f; }
        #score-board { color: #fff; min-width: 80px; pointer-events: auto; }
        #shot-timer-ui { color: #2ecc71; border-color: #2ecc71; }
        
        #exit-btn, #start-match-btn {
            color: white; border: 2px solid #fff; border-radius: 4px;
            font-size: 13px; font-weight: bold; cursor: pointer; pointer-events: auto;
            padding: 6px 12px; font-family: inherit;
        }
        #exit-btn { background: #c0392b; }
        #start-match-btn { background: #27ae60; display: none; }

        #goal-banner {
            position: absolute; top: 40%; font-size: 70px; font-weight: 900;
            text-shadow: 4px 4px 0px #000, -2px -2px 0px #000;
            color: #1976d2; z-index: 200; pointer-events: none; display: none;
            font-style: italic; font-family: sans-serif;
            animation: goalPop 0.5s ease-out infinite alternate;
        }
        #goal-banner::before { content: "GOAL!"; position: absolute; left: -5px; top: -5px; color: #f1c40f; z-index: -1; }
        @keyframes goalPop { 0% { transform: scale(0.9) rotate(-5deg); } 100% { transform: scale(1.1) rotate(5deg); } }
        canvas { background: #2e7d32; border: 10px solid #1b5e20; border-radius: 8px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="menu">
        <h1>ÇİVİLİ FUTBOL</h1>
        <div class="input-group">
            <label>OYUNCU İSMİ</label>
            <input type="text" id="player-name" value="Oyuncu" maxlength="12">
        </div>
        <div class="input-group">
            <label>MAÇ SÜRESİ</label>
            <select id="match-duration">
                <option value="2">2 Dakika</option>
                <option value="3">3 Dakika</option>
                <option value="5">5 Dakika</option>
            </select>
        </div>
        <div class="mode-container">
            <button class="main-btn btn-ai" onclick="startSetupPhase('ai')">🤖 Bilgisayara Karşı Oyna</button>
            <button class="main-btn btn-local" onclick="startSetupPhase('local')">👥 Aynı Cihazda 2 Kişi</button>
            <button class="main-btn btn-online" onclick="openOnlineLobby()">🌐 Online Eşleşme</button>
        </div>
    </div>

    <div id="online-lobby">
        <h2>ÇEVRİMİÇİ HAVUZ</h2>
        <div class="player-list" id="lobby-list"></div>
        <button class="lobby-close-btn" onclick="closeOnlineLobby()">Geri Dön</button>
    </div>

    <div id="top-bar">
        <div class="hud-row">
            <button id="exit-btn" onclick="exitToMenu()">ÇIKIŞ</button>
            <div id="match-timer">02:00</div>
            <div id="score-board">0 - 0</div>
            <div id="shot-timer-ui">3.0</div>
            <button id="start-match-btn" onclick="confirmFormationsAndStart()">BAŞLAT</button>
        </div>
    </div>

    <div id="goal-banner">GOAL!</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const width = Math.min(window.innerWidth - 20, 360);
        const height = Math.min(window.innerHeight - 80, 620);
        canvas.width = width; canvas.height = height;

        // SERVER BAGLANTI AYARI
        // Kendi Render linkini buraya yazıyorsun:
        const socket = io("https://civili-football-6.onrender.com"); 

        let currentPhase = 'menu'; 
        let gameMode = 'ai'; 
        let score = { p1: 0, p2: 0 };
        let turn = 1;
        let matchTimeRemaining = 120;
        let matchInterval = null;
        let shotTimeLeft = 3.0;
        let shotTimerInterval = null;
        let myTeamNumber = 1; 
        let currentRoomId = null;

        let cap = { x: width/2, y: height/2, vx: 0, vy: 0, radius: 11, friction: 0.983, rotation: 0 };
        let pins = []; let benchPins = []; let selectedPin = null; 
        let isDraggingBall = false; let dragStart = { x: 0, y: 0 }, dragCurrent = { x: 0, y: 0 };

        const ballDiameter = cap.radius * 2;
        const minAllowedDistance = ballDiameter * 2.5; 
        const goalWidth = cap.radius * 2 * 3.2, goalHeight = 12;
        const penaltyBoxW = goalWidth * 2.2, penaltyBoxH = height * 0.15;
        const pBoxX1 = (width - penaltyBoxW) / 2, pBoxX2 = pBoxX1 + penaltyBoxW;
        const p1BoxY1 = height - penaltyBoxH, p2BoxY1 = 0;
        const benchY = 45;

        drawFieldLinesOnly();

        function drawFieldLinesOnly() {
            ctx.clearRect(0, 0, width, height);
            ctx.strokeStyle = "rgba(255,255,255,0.35)"; ctx.lineWidth = 2.5;
            ctx.beginPath(); ctx.moveTo(0, height/2); ctx.lineTo(width, height/2); ctx.stroke();
            ctx.beginPath(); ctx.arc(width/2, height/2, 45, 0, Math.PI*2); ctx.stroke();
            ctx.strokeRect(pBoxX1, 0, penaltyBoxW, penaltyBoxH);
            ctx.strokeRect(pBoxX1, height - penaltyBoxH, penaltyBoxW, penaltyBoxH);
        }

        // --- GERÇEK SOKET OLAYLARI ---
        function openOnlineLobby() {
            const myName = document.getElementById('player-name').value || "Oyuncu";
            socket.emit("join-lobby", myName);
            document.getElementById('menu').style.display = 'none';
            document.getElementById('online-lobby').style.display = 'block';
        }

        function closeOnlineLobby() {
            socket.emit("leave-lobby");
            document.getElementById('online-lobby').style.display = 'none';
            document.getElementById('menu').style.display = 'block';
        }

        socket.on("update-lobby-players", (players) => {
            const listContainer = document.getElementById('lobby-list');
            listContainer.innerHTML = "";
            players.forEach(p => {
                if (p.id !== socket.id) {
                    const item = document.createElement('div');
                    item.className = 'player-item';
                    item.innerHTML = `<span>⚽ ${p.name}</span><span class="status">Davet Et</span>`;
                    item.onclick = () => socket.emit("send-invite", p.id);
                    listContainer.appendChild(item);
                }
            });
            if(listContainer.innerHTML === "") {
                listContainer.innerHTML = "<div style='padding:15px;color:#888;'>Havuzda aktif başka oyuncu yok... Diğer telefondan da giriş yapın.</div>";
            }
        });

        socket.on("receive-invite", (fromId) => {
            if(confirm("Yeni bir maç daveti aldınız! Kabul ediyor musunuz?")) {
                socket.emit("accept-invite", fromId);
            }
        });

        socket.on("start-online-match", ({ roomId, team }) => {
            currentRoomId = roomId;
            myTeamNumber = team; 
            document.getElementById('online-lobby').style.display = 'none';
            startSetupPhase('online');
        });

        socket.on("opponent-shot", (ballData) => {
            // Ters simetriyi düzeltmek için pozisyonu ve hızları ters çeviriyoruz
            cap.x = width - ballData.x;
            cap.y = height - ballData.y;
            cap.vx = -ballData.vx;
            cap.vy = -ballData.vy;
            turn = myTeamNumber;
            resetShotTimer();
        });

        // ---------------------------------

        function startSetupPhase(mode) {
            gameMode = mode;
            currentPhase = 'setup';
            score = { p1: 0, p2: 0 };
            document.getElementById('score-board').innerText = "0 - 0";
            document.getElementById('menu').style.display = 'none';
            document.getElementById('top-bar').style.display = 'flex';
            document.getElementById('start-match-btn').style.display = 'block';
            document.getElementById('start-match-btn').style.opacity = '0.5';

            pins = [
                {x: (width - goalWidth)/2, y: goalHeight, isPost: true}, {x: (width + goalWidth)/2, y: goalHeight, isPost: true},
                {x: (width - goalWidth)/2, y: height - goalHeight, isPost: true}, {x: (width + goalWidth)/2, y: height - goalHeight, isPost: true}
            ];

            benchPins = [];
            for(let i=0; i<11; i++) {
                benchPins.push({
                    id: i, x: 25 + i * ((width - 40) / 10), y: benchY,
                    homeX: 25 + i * ((width - 40) / 10), homeY: benchY,
                    team: 1, onField: false
                });
            }

            if(gameMode === 'ai') generateOpponentFormation();
            cap.x = width/2; cap.y = height/2; cap.vx = 0; cap.vy = 0;
            animate();
        }

        function generateOpponentFormation() {
            let oppPositions = [
                {x: width/2, y: height*0.12}, {x: width*0.2, y: height*0.26}, {x: width*0.5, y: height*0.24}, {x: width*0.8, y: height*0.26}, 
                {x: width*0.15, y: height*0.45}, {x: width*0.38, y: height*0.42}, {x: width*0.62, y: height*0.42}, {x: width*0.85, y: height*0.45}, 
                {x: width*0.25, y: height*0.65}, {x: width*0.75, y: height*0.65}, {x: width/2, y: height*0.75}
            ];
            oppPositions.forEach(pos => { pins.push({ x: pos.x, y: pos.y, team: 2 }); });
        }

        function checkFormationsReady() {
            const allPlaced = benchPins.every(p => p.onField);
            document.getElementById('start-match-btn').style.opacity = allPlaced ? '1' : '0.5';
        }

        function confirmFormationsAndStart() {
            if (!benchPins.every(p => p.onField)) {
                alert("Lütfen üstteki tüm oyuncularınızı sahaya yerleştirin!");
                return;
            }
            benchPins.forEach(p => { pins.push({ x: p.x, y: p.y, team: 1 }); });
            benchPins = [];
            document.getElementById('start-match-btn').style.display = 'none';
            currentPhase = 'playing';
            turn = 1;
            matchTimeRemaining = parseInt(document.getElementById('match-duration').value) * 60;
            
            clearInterval(matchInterval);
            matchInterval = setInterval(() => {
                matchTimeRemaining--;
                const m = Math.floor(matchTimeRemaining / 60).toString().padStart(2, '0');
                const s = (matchTimeRemaining % 60).toString().padStart(2, '0');
                document.getElementById('match-timer').innerText = `${m}:${s}`;
                if(matchTimeRemaining <= 0) exitToMenu();
            }, 1000);
            resetShotTimer();
        }

        function isInsideP1PenaltyBox(x, y) { return (x >= pBoxX1 && x <= pBoxX2 && y >= p1BoxY1); }

        function resetShotTimer() {
            clearInterval(shotTimerInterval);
            if (currentPhase !== 'playing') return;
            shotTimeLeft = 3.0;
            shotTimerInterval = setInterval(() => {
                if (Math.hypot(cap.vx, cap.vy) < 0.15) {
                    shotTimeLeft -= 0.1;
                    if (shotTimeLeft <= 0) {
                        shotTimeLeft = 0;
                        turn = turn === 1 ? 2 : 1;
                        resetShotTimer();
                    }
                    document.getElementById('shot-timer-ui').innerText = shotTimeLeft.toFixed(1);
                }
            }, 100);
        }

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const pos = { x: (e.touches ? e.touches[0].clientX : e.clientX) - rect.left, y: (e.touches ? e.touches[0].clientY : e.clientY) - rect.top };

            if (currentPhase === 'setup') {
                for (let p of benchPins) {
                    if (Math.hypot(pos.x - p.x, pos.y - p.y) < 20) { selectedPin = p; break; }
                }
            } 
            else if (currentPhase === 'playing') {
                if (Math.hypot(cap.vx, cap.vy) > 0.2) return;
                if (gameMode === 'ai' && turn === 2) return;
                // Online modda sadece sıra bendeyken vurabilirim
                if (gameMode === 'online' && turn !== myTeamNumber) return;

                if (Math.hypot(pos.x - cap.x, pos.y - cap.y) < 45) {
                    isDraggingBall = true; dragStart = { x: cap.x, y: cap.y }; dragCurrent = pos;
                }
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const pos = { x: (e.touches ? e.touches[0].clientX : e.clientX) - rect.left, y: (e.touches ? e.touches[0].clientY : e.clientY) - rect.top };
            if (currentPhase === 'setup' && selectedPin) { selectedPin.x = pos.x; selectedPin.y = pos.y; } 
            else if (currentPhase === 'playing' && isDraggingBall) { dragCurrent = pos; }
        });

        window.addEventListener('mouseup', () => {
            if (currentPhase === 'setup' && selectedPin) {
                let valid = true;
                if (selectedPin.x < 10 || selectedPin.x > width - 10 || selectedPin.y < 75 || selectedPin.y > height - 10) valid = false;
                if (valid) { selectedPin.onField = true; } 
                else { selectedPin.x = selectedPin.homeX; selectedPin.y = selectedPin.homeY; selectedPin.onField = false; }
                selectedPin = null; checkFormationsReady();
            } 
            if (currentPhase === 'playing' && isDraggingBall) {
                isDraggingBall = false;
                cap.vx = (dragStart.x - dragCurrent.x) * 0.13;
                cap.vy = (dragStart.y - dragCurrent.y) * 0.13;
                
                // Online modda vuruşu karşı tarafa bildir
                if(gameMode === 'online') {
                    socket.emit("player-shot", { roomId: currentRoomId, x: cap.x, y: cap.y, vx: cap.vx, vy: cap.vy });
                }

                turn = turn === 1 ? 2 : 1;
                resetShotTimer();
            }
        });

        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); canvas.dispatchEvent(new MouseEvent('mousedown', { clientX: e.touches[0].clientX, clientY: e.touches[0].clientY })); }, {passive:false});
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); canvas.dispatchEvent(new MouseEvent('mousemove', { clientX: e.touches[0].clientX, clientY: e.touches[0].clientY })); }, {passive:false});
        window.addEventListener('touchend', () => window.dispatchEvent(new MouseEvent('mouseup')));

        function exitToMenu() {
            currentPhase = 'menu'; clearInterval(matchInterval); clearInterval(shotTimerInterval);
            document.getElementById('menu').style.display = 'block'; document.getElementById('top-bar').style.display = 'none';
            drawFieldLinesOnly(); 
        }

        function updatePhysics() {
            if(currentPhase !== 'playing') return;
            cap.x += cap.vx; cap.y += cap.vy; cap.vx *= cap.friction; cap.vy *= cap.friction;
            if (cap.x - cap.radius < 0) { cap.x = cap.radius; cap.vx *= -0.85; }
            if (cap.x + cap.radius > width) { cap.x = width - cap.radius; cap.vx *= -0.85; }
            
            if (cap.y - cap.radius <= goalHeight || cap.y + cap.radius >= height - goalHeight) {
                if (cap.x > (width - goalWidth)/2 && cap.x < (width + goalWidth)/2) {
                    if (cap.y < height / 2) score.p1++; else score.p2++;
                    document.getElementById('score-board').innerText = `${score.p1} - ${score.p2}`;
                    cap.x = width/2; cap.y = height/2; cap.vx = 0; cap.vy = 0;
                    return;
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            ctx.strokeStyle = "rgba(255,255,255,0.35)"; ctx.lineWidth = 2.5;
            ctx.beginPath(); ctx.moveTo(0, height/2); ctx.lineTo(width, height/2); ctx.stroke();
            if (currentPhase === 'setup') { ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(0, 0, width, 70); }
            pins.forEach(pin => {
                ctx.fillStyle = pin.team === 1 ? '#0044ff' : '#cc0000';
                ctx.beginPath(); ctx.arc(pin.x, pin.y, pin.isPost ? 4 : 8, 0, Math.PI*2); ctx.fill();
            });
            if (currentPhase === 'setup') benchPins.forEach(p => { ctx.fillStyle = '#0044ff'; ctx.beginPath(); ctx.arc(p.x, p.y, 8, 0, Math.PI*2); ctx.fill(); });
            if (currentPhase === 'playing') { ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(cap.x, cap.y, cap.radius, 0, Math.PI*2); ctx.fill(); }
        }

        function animate() { if (currentPhase === 'menu') return; updatePhysics(); draw(); requestAnimationFrame(animate); }
    </script>
</body>
</html>
