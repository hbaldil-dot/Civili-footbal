<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Çivili Futbol</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js" defer></script>
    <script src="game.js" defer></script>
</head>
<body>

    <!-- ===== ANA MENÜ ===== -->
    <div id="menu">

        <!-- İSMİNİ GİR + LOGO -->
        <div class="input-group">
            <div class="input-wrapper">
                <div class="logo-container">
                    <img src="butonlar/logo-alani.webp" alt="Logo" class="input-logo">
                    <img id="selected-team-logo-display" src="takimlar/default.png" alt="Takım Logosu" class="team-logo-overlay">
                </div>
                <img src="butonlar/ismini-gir.webp" alt="İsmini Gir" class="input-icon">
                <input type="text" id="player-name" value="Oyuncu" maxlength="12">
            </div>
        </div>

        <!-- TAKIM SEÇ BUTONU -->
        <button class="menu-btn" onclick="toggleTeamSelect()">
            <img src="butonlar/takim-sec.webp" alt="TAKIM SEÇ" class="menu-btn-img">
        </button>

        <!-- TAKIM LOGO SEÇİM ALANI -->
        <div class="team-logo-container" id="team-logo-container" style="display: none;">
            <div class="team-logo-options" id="team-logo-options"></div>
            <div class="selected-text">
                Seçili: <span id="selected-team-name-display">Varsayılan</span>
            </div>
        </div>

        <!-- OYUN MODLARI -->
        <button class="menu-btn" onclick="openAILevelMenu()">
            <img src="butonlar/bilgisayara-karsi.webp" alt="BİLGİSAYARA KARŞI" class="menu-btn-img">
        </button>
        
        <button class="menu-btn" onclick="openLocalTeamSelect()">
            <img src="butonlar/2kisi-ayni-ekran.webp" alt="2 KİŞİLİK AYNI EKRAN" class="menu-btn-img">
        </button>
        
        <button class="menu-btn" onclick="openOnlineLobby()">
            <img src="butonlar/online-mac.png" alt="ONLINE MAÇ" class="menu-btn-img">
        </button>

        <!-- AYARLAR -->
        <button class="menu-btn settings-btn" onclick="openSettingsPopup()">
            <img src="butonlar/ayarlar.webp" alt="AYARLAR" class="menu-btn-img">
        </button>

    </div>

    <!-- ===== AYARLAR POP-UP ===== -->
<div id="settings-popup" style="display: none;" onclick="if(event.target===this) closeSettingsPopup()">
    <div class="popup-content settings-popup">
        <div class="settings-container">
            <img src="menu/ayarlar/arkafon.webp" alt="Ayarlar" class="settings-bg">
            
            <!-- STADYUM -->
            <div style="position:absolute; top:22%; left:50%; transform:translateX(-50%); width:70%; cursor:pointer;" onclick="alert('🏟️ Stadyum seçimi açılıyor...')">
                <img src="menu/ayarlar/stadyum.webp" alt="Stadyum" style="width:100%; display:block; pointer-events:none;">
            </div>
            
            <!-- MAÇ SÜRESİ -->
            <div style="position:absolute; top:38%; left:50%; transform:translateX(-50%); width:70%; cursor:pointer;" onclick="cycleDuration()">
                <img src="menu/ayarlar/mac suresi.webp" alt="Maç Süresi" style="width:100%; display:block; pointer-events:none;">
                <span id="durationDisplay" style="position:absolute; right:8%; top:50%; transform:translateY(-50%); color:#fff; font-size:16px; font-weight:bold; font-family:'Arial',sans-serif; text-shadow:0 2px 8px rgba(0,0,0,0.8); pointer-events:none;">90s</span>
            </div>
            
            <!-- VURUŞ SÜRESİ -->
            <div style="position:absolute; top:54%; left:50%; transform:translateX(-50%); width:70%; cursor:pointer;" onclick="cycleShotDuration()">
                <img src="menu/ayarlar/vurus suresi.webp" alt="Vuruş Süresi" style="width:100%; display:block; pointer-events:none;">
                <span id="shotDurationDisplay" style="position:absolute; right:8%; top:50%; transform:translateY(-50%); color:#fff; font-size:16px; font-weight:bold; font-family:'Arial',sans-serif; text-shadow:0 2px 8px rgba(0,0,0,0.8); pointer-events:none;">3s</span>
            </div>
            
            <!-- SES -->
            <div style="position:absolute; top:70%; left:50%; transform:translateX(-50%); width:70%; cursor:pointer;" onclick="toggleSound()">
                <img id="soundBtnImg" src="menu/ayarlar/ses.webp" alt="Ses" style="width:100%; display:block; pointer-events:none;">
            </div>
            
            <!-- GERİ -->
            <div style="position:absolute; bottom:4%; left:50%; transform:translateX(-50%); width:35%; cursor:pointer;" onclick="closeSettingsPopup()">
                <img src="menu/ayarlar/ana menu.webp" alt="Geri" style="width:100%; display:block; pointer-events:none;">
            </div>
        </div>
    </div>
</div>
<!-- ===== AI ZORLUK POP-UP ===== -->
<div id="ai-level-menu" style="display: none;">
    <div class="popup-content difficulty-popup">
        <div class="difficulty-container">
            <!-- Zorluk Seçimi Ana Görseli -->
            <img src="menu/zorluk/zorluk-secimi.webp" alt="Zorluk Seçimi" class="difficulty-bg">
            
            <!-- KOLAY -->
            <div class="difficulty-btn-area" style="position:absolute; top:40%; left:50%; transform:translateX(-50%); width:60%; cursor:pointer;" onclick="selectDifficulty('kolay')">
                <img src="menu/zorluk/kolay.webp" alt="Kolay" style="width:100%; display:block; pointer-events:none;">
            </div>
            
            <!-- ORTA -->
            <div class="difficulty-btn-area" style="position:absolute; top:52%; left:50%; transform:translateX(-50%); width:60%; cursor:pointer;" onclick="selectDifficulty('orta')">
                <img src="menu/zorluk/orta.webp" alt="Orta" style="width:100%; display:block; pointer-events:none;">
            </div>
            
            <!-- ZOR -->
            <div class="difficulty-btn-area" style="position:absolute; top:64%; left:50%; transform:translateX(-50%); width:60%; cursor:pointer;" onclick="selectDifficulty('zor')">
                <img src="menu/zorluk/zor.webp" alt="Zor" style="width:100%; display:block; pointer-events:none;">
            </div>
            
            <!-- USTA -->
            <div class="difficulty-btn-area" style="position:absolute; top:76%; left:50%; transform:translateX(-50%); width:60%; cursor:pointer;" onclick="selectDifficulty('usta')">
                <img src="menu/zorluk/usta.webp" alt="Usta" style="width:100%; display:block; pointer-events:none;">
            </div>
            
            <!-- GERİ -->
            <div class="difficulty-btn-area" style="position:absolute; bottom:1%; left:50%; transform:translateX(-50%); width:35%; cursor:pointer;" onclick="closeAILevelMenu()">
                <img src="menu/zorluk/ana menu.webp" alt="Geri" style="width:100%; display:block; pointer-events:none;">
            </div>
        </div>
    </div>
</div>
    <!-- ===== ONLINE LOBI POP-UP ===== -->
    <div id="online-lobby" style="display: none;" onclick="if(event.target===this) closeOnlineLobby()">
        <div class="popup-content">
            <div class="popup-header">
                <h2>ONLINE HAVUZ</h2>
                <button class="popup-close" onclick="closeOnlineLobby()">✕</button>
            </div>
            <div class="popup-body">
                <p style="font-size: 11px; color: #ccc; margin-bottom: 10px;">Maç yapmak istediğiniz kişiye tıklayarak davet gönderin</p>
                <div class="player-list" id="lobby-list">
                    <div style="padding:15px;color:#888;text-align:center;">Havuz güncelleniyor...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== 2 KİŞİLİK TAKIM SEÇ POP-UP ===== -->
    <div id="local-team-select" style="display: none;" onclick="if(event.target===this) closeLocalTeamSelect()">
        <div class="popup-content">
            <div class="popup-header">
                <h2>TAKIM SEÇİMİ</h2>
                <button class="popup-close" onclick="closeLocalTeamSelect()">✕</button>
            </div>
            <div class="popup-body">
                <div class="player-team-select">
                    <h3 style="color: #3498db;">Oyuncu 1</h3>
                    <div class="team-logo-options" id="local-player1-logos"></div>
                </div>
                <div style="border-top: 1px solid #333; margin: 12px 0;"></div>
                <div class="player-team-select">
                    <h3 style="color: #e74c3c;">Oyuncu 2</h3>
                    <div class="team-logo-options" id="local-player2-logos"></div>
                </div>
                <div style="margin-top: 12px; text-align: center; font-size: 12px; color: #888;">
                    Seçili: <span id="local-p1-name" style="color: #3498db; font-weight: bold;">Seçilmedi</span> vs <span id="local-p2-name" style="color: #e74c3c; font-weight: bold;">Seçilmedi</span>
                </div>
            </div>
            <div class="popup-footer">
                <button class="popup-close-btn" onclick="startLocalGameWithTeams()">MAÇA BAŞLA</button>
            </div>
        </div>
    </div>

    <!-- ===== OYUN EKRANI ===== -->
    <div id="top-bar" style="display: none;">
        <div class="hud-row">
            <button id="exit-btn" onclick="exitToMenu()">✕</button>
            <div id="score-board">
                <div class="team-score">
                    <img id="score-logo-p1" src="takimlar/default.png" alt="Takım 1" class="score-logo">
                    <span id="score-p1">0</span>
                </div>
                <span id="score-divider">-</span>
                <div class="team-score">
                    <span id="score-p2">0</span>
                    <img id="score-logo-p2" src="takimlar/default.png" alt="Takım 2" class="score-logo">
                </div>
            </div>
            <div id="time-board">90s</div>
        </div>
        <div class="hud-row-second">
            <div id="turn-indicator">Diziliş</div>
            <div id="shot-timer">ŞUT: 3s</div>
        </div>
    </div>

    <!-- ===== CANVAS VE BUTON ===== -->
    <div class="canvas-container">
        <canvas id="gameCanvas"></canvas>
        <button id="start-match-btn" onclick="confirmFormationsAndStart()">BAŞLAT</button>
    </div>

    <!-- ===== GÜÇ GÖSTERGESİ ===== -->
    <div id="power-bar-container">
        <div id="power-bar"></div>
    </div>

</body>
</html>
